<style>
  :root {

    --surface: #1a1d2e;
    --surface2: #252840;
    --border: #3a3d5c;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --win: #4ade80;
    --lose: #f87171;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; padding-left: max(20px, env(safe-area-inset-left)); padding-right: max(20px, env(safe-area-inset-right)); padding-top: env(safe-area-inset-top); display: flex; align-items: center; gap: 8px; min-height: 56px; position: sticky; top: 0; z-index: 100; }
  nav .logo { font-weight: 700; font-size: 18px; color: var(--accent); margin-right: auto; }
  nav button { background: none; border: none; color: var(--text-muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .2s; }
  nav button.active, nav button:hover { background: var(--accent); color: #fff; }

  /* PAGES */
  .page { display: none; padding: 24px 20px; max-width: 900px; margin: 0 auto; }
  .page.active { display: block; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--accent); }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5851e0; }
  .btn-danger { background: var(--accent2); color: #fff; }
  .btn-danger:hover { background: #e05574; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* FORM */
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 14px; width: 100%; outline: none; transition: border .2s; }
  input:focus, select:focus { border-color: var(--accent); }
  label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; display: block; }

  /* POKEMON SLOT */
  .slot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .slot-grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .pokemon-slot { position: relative; }
  .slot-input-wrap { position: relative; }
  .slot-input-wrap input { padding-right: 32px; }
  .slot-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 2px 4px; }
  .slot-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .autocomplete-list { position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: var(--surface2); border: 1px solid var(--accent); border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 200; display: none; }
  .autocomplete-list.open { display: block; }
  .autocomplete-item { padding: 8px 12px; cursor: pointer; font-size: 13px; transition: background .15s; }
  .autocomplete-item:hover, .autocomplete-item.selected { background: var(--accent); color: #fff; }
  .autocomplete-item .form-tag { font-size: 11px; opacity: .7; }

  /* PARTY LIST */
  .party-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .party-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all .2s; }
  .party-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .party-card.selected { border-color: var(--accent); background: #2a2a50; }
  .party-name { font-weight: 600; margin-bottom: 8px; }
  .party-pokemon { display: flex; flex-wrap: wrap; gap: 4px; }
  .poke-tag { font-size: 11px; background: var(--bg); padding: 2px 8px; border-radius: 20px; color: var(--text-muted); }

  /* RECORD LIST */
  .record-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border .2s; }
  .record-item:hover { border-color: var(--accent); }
  .record-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .badge-win { background: #14532d; color: var(--win); padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .badge-lose { background: #450a0a; color: var(--lose); padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .record-date { font-size: 12px; color: var(--text-muted); }
  .record-detail { font-size: 12px; color: var(--text-muted); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  /* SECTION DIVIDER */
  .section-label { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin: 20px 0 12px; }

  /* RESULT TOGGLE */
  .result-toggle { display: flex; gap: 10px; }
  .result-btn { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 8px; background: none; color: var(--text-muted); cursor: pointer; font-size: 16px; font-weight: 700; transition: all .2s; }
  .result-btn.win.active { border-color: var(--win); background: #14532d; color: var(--win); }
  .result-btn.lose.active { border-color: var(--lose); background: #450a0a; color: var(--lose); }

  /* DETAIL VIEW */
  .detail-section { margin-bottom: 16px; }
  .detail-section h4 { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .detail-pokemon { display: flex; flex-wrap: wrap; gap: 6px; }
  .detail-poke-tag { font-size: 13px; background: var(--surface2); padding: 4px 12px; border-radius: 20px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .flex { display: flex; }
  .gap-2 { gap: 8px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .mb-3 { margin-bottom: 12px; }
  .mb-4 { margin-bottom: 16px; }
  .mt-2 { margin-top: 8px; }
  .text-muted { color: var(--text-muted); font-size: 13px; }
  .count-badge { background: var(--surface2); color: var(--text-muted); font-size: 12px; padding: 2px 8px; border-radius: 20px; }
  .filter-tag { display:inline-flex; align-items:center; gap:5px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:3px 10px; font-size:12px; }
  .filter-tag button { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; line-height:1; padding:0; }
  .filter-tag button:hover { color:var(--accent2); }
  .highlight-tag { background: rgba(108,99,255,0.3) !important; border-color: var(--accent) !important; }
</style>
</head>

<!-- HISTORY PAGE -->
<div id="page-history" class="page">

  </div>

        <div class="text-muted">試合</div>
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--win)" id="stat-win">0</div>
        <div class="text-muted">勝ち</div>
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--lose)" id="stat-lose">0</div>
        <div class="text-muted">負け</div>
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--accent)" id="stat-rate">-</div>
        <div class="text-muted">勝率</div>
      </div>
    </div>
  </div>

  <div id="history-list"></div>
</div>

<div class="modal-overlay" id="party-modal">

      <button class="btn btn-ghost" onclick="closePartyModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveParty()">保存</button>

  </div>
</div>

      <button class="btn btn-ghost" onclick="closeDetailModal()">閉じる</button>
    </div>
  </div>
</div>

let parties = JSON.parse(localStorage.getItem('pkm_parties') || '[]');
let records = JSON.parse(localStorage.getItem('pkm_records') || '[]');
let selectedPartyId = null;
let recordResult = null;
let editingPartyId = null;
const mySelFilter = [];
const oppSelFilter = [];
let currentUser = null;
let _fbReady = false;

// Firestore保存（ログイン中のみ、localStorageにも同時保存）
async function saveData() {
  localStorage.setItem('pkm_parties', JSON.stringify(parties));
  localStorage.setItem('pkm_records', JSON.stringify(records));
  if (!currentUser || !_fbReady) return;
  const { doc, setDoc } = window._firestoreOps;
  const db = window._db;
  const uid = currentUser.uid;
  try {
    await setDoc(doc(db, 'users', uid, 'data', 'main'), {
      parties, records, updatedAt: window._firestoreOps.serverTimestamp()
    });
  } catch(e) { console.error('Firestore save error:', e); }
}

// Firestoreからロード
async function loadFromFirestore() {
  if (!currentUser || !_fbReady) return;
  const { doc, getDoc } = window._firestoreOps;
  const db = window._db;
  const uid = currentUser.uid;
  try {
    const snap = await getDoc(doc(db, 'users', uid, 'data', 'main'));
    if (snap.exists()) {
      const data = snap.data();
      parties = data.parties || [];
      records = data.records || [];
      // localStorageも更新
      localStorage.setItem('pkm_parties', JSON.stringify(parties));
      localStorage.setItem('pkm_records', JSON.stringify(records));
    }
  } catch(e) { console.error('Firestore load error:', e); }
}

// 認証トグル
async function toggleAuth() {
  if (currentUser) {
    await window._signOut(window._auth);
  } else {
    const provider = new window._GoogleAuthProvider();
    try {
      await window._signInWithPopup(window._auth, provider);
    } catch(e) { console.error('Auth error:', e); }
  }
}

// Firebase初期化待ちでAuth監視を開始
function initFirebase() {
  _fbReady = true;
  window._onAuthStateChanged(window._auth, async (user) => {
    currentUser = user;
    const nameEl = document.getElementById('user-name');
    const btnEl = document.getElementById('auth-btn');
    const banner = document.getElementById('login-banner');
    if (user) {
      nameEl.textContent = user.displayName || user.email;
      btnEl.textContent = 'ログアウト';
      banner.style.display = 'none';
      await loadFromFirestore();
      renderParties();
      renderHistory();
    } else {
      nameEl.textContent = '';
      btnEl.textContent = 'ログイン';
      banner.style.display = 'block';
    }
  });
}

// Firebase準備完了イベント待ち
if (window._firebaseReady) {
  initFirebase();
} else {
  document.addEventListener('firebase-ready', initFirebase);
}

// ---- AUTOCOMPLETE ----
function createPokemonSlot(containerId, index, label) {
  const wrap = document.createElement('div');
  wrap.className = 'pokemon-slot';
  wrap.innerHTML = `
    <div class="slot-label">${label}</div>
    <div class="slot-input-wrap" style="position:relative">
      <input type="text" placeholder="ポケモン名を入力" autocomplete="off"
        data-container="${containerId}" data-index="${index}"
        oninput="onSlotInput(this)" onkeydown="onSlotKeydown(event, this)">
      <button class="slot-clear" onclick="clearSlot(this)" tabindex="-1">×</button>
      <div class="autocomplete-list" id="ac-${containerId}-${index}"></div>
    </div>
  `;
  return wrap;
}

// カタカナ↔ひらがな変換
function toHiragana(str) {
  return str.replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}
function toKatakana(str) {
  return str.replace(/[ぁ-ゖ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
}

function onSlotInput(input) {
  const val = input.value.trim();
  const listId = `ac-${input.dataset.container}-${input.dataset.index}`;
  const list = document.getElementById(listId);
  if (!val || val.length < 1) { list.classList.remove('open'); return; }
  const valKana = toKatakana(val);
  const valHira = toHiragana(val);
  const allMatches = POKEMON_LIST.filter(p => {
    const d = p.display;
    const dH = toHiragana(d);
    return d.includes(valKana) || dH.includes(valHira);
  });
  // 頭文字一致を先に、途中一致を後に並べる
  const startsWith = allMatches.filter(p => {
    const dH = toHiragana(p.display);
    return dH.startsWith(valHira) || p.display.startsWith(valKana);
  });
  const others = allMatches.filter(p => {
    const dH = toHiragana(p.display);
    return !dH.startsWith(valHira) && !p.display.startsWith(valKana);
  });
  const matches = [...startsWith, ...others].slice(0, 20);
  if (!matches.length) { list.classList.remove('open'); return; }
  list.innerHTML = matches.map(p =>
    `<div class="autocomplete-item" data-display="${p.display}">${p.display}</div>`
  ).join('');
  // mousedownでクリック選択（inputのblur前に発火する）
  list.querySelectorAll('.autocomplete-item').forEach(item => {
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      input.value = item.dataset.display;
      list.classList.remove('open');
    });
  });
  list.classList.add('open');
}

function onSlotKeydown(e, input) {
  const listId = `ac-${input.dataset.container}-${input.dataset.index}`;
  const list = document.getElementById(listId);
  const items = list.querySelectorAll('.autocomplete-item');
  const current = list.querySelector('.selected');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!current) items[0]?.classList.add('selected');
    else { current.classList.remove('selected'); (current.nextElementSibling || items[0])?.classList.add('selected'); }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (current) { current.classList.remove('selected'); (current.previousElementSibling || items[items.length-1])?.classList.add('selected'); }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const sel = list.querySelector('.selected') || items[0];
    if (sel) { input.value = sel.dataset.display; list.classList.remove('open'); }
  } else if (e.key === 'Escape') {
    list.classList.remove('open');
  }
}

function selectPokemon(el, listId) {
  const list = document.getElementById(listId);
  const input = list.closest('.slot-input-wrap').querySelector('input[type=text]');
  if (input) input.value = el.dataset.display;
  list.classList.remove('open');
}

function clearSlot(btn) {
  // btn の親 (.slot-input-wrap) の中の input を取得
  btn.closest('.slot-input-wrap').querySelector('input[type=text]').value = '';
}

// 選出用プルダウン生成（自分/相手のパーティ6体のみ）
function createSelectionDropdown(containerId, index, label, options) {
  const wrap = document.createElement('div');
  wrap.className = 'pokemon-slot';
  const opts = options.filter(Boolean).map(p => `<option value="${p}">${p}</option>`).join('');
  wrap.innerHTML = `
    <div class="slot-label">${label}</div>
    <select data-container="${containerId}" data-index="${index}">
      <option value="">-- 選択 --</option>
      ${opts}
    </select>
  `;
  return wrap;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.pokemon-slot')) {
    document.querySelectorAll('.autocomplete-list').forEach(l => l.classList.remove('open'));
  }
});

function getSlotValues(containerId, count) {
  const container = document.getElementById(containerId);
  // input[type=text] と select 両方に対応
  const inputs = Array.from(container.querySelectorAll('input[type=text], select'));
  return inputs.slice(0, count).map(i => i.value.trim());
}

function setSlotValues(containerId, values) {
  const container = document.getElementById(containerId);
  const inputs = container.querySelectorAll('input[type=text]');
  values.forEach((v, i) => { if (inputs[i]) inputs[i].value = v; });
}

// ---- FILTER SELECTS ----
// 自分の選出フィルター: パーティ選択に連動して選択肢を更新
function updateMySelFilterSelect() {
  const sel = document.getElementById('my-sel-filter-select');
  const hint = document.getElementById('my-sel-filter-hint');
  const filterVal = document.getElementById('history-filter').value;
  const party = filterVal ? parties.find(p => p.id === filterVal) : null;
  const options = party ? party.pokemon.filter(Boolean) : [];
  if (!options.length) {
    sel.disabled = true;
    sel.innerHTML = '<option value="">-- 選択 --</option>';
    if (hint) hint.textContent = '（パーティを先に選択してください）';
    return;
  }
  sel.disabled = false;
  if (hint) hint.textContent = '';
  sel.innerHTML = '<option value="">-- 選択 --</option>' +
    options.map(p => `<option value="${p}">${p}</option>`).join('');
}

// 相手の選出フィルター: 全試合の相手選出から重複除去して選択肢を生成
function updateOppSelFilterSelect() {
  const sel = document.getElementById('opp-sel-filter-select');
  const all = [...new Set(records.flatMap(r => r.oppSelection.filter(Boolean)))].sort();
  sel.innerHTML = '<option value="">-- 選択 --</option>' +
    all.map(p => `<option value="${p}">${p}</option>`).join('');
}

function addFilterTagFromSelect(selectEl, filterKey) {
  const name = selectEl.value;
  if (!name) return;
  selectEl.value = ''; // 選択後リセット
  addFilterTag(name, filterKey);
}

function addFilterTag(name, filterKey) {
  const arr = filterKey === 'mySelFilter' ? mySelFilter : oppSelFilter;
  if (arr.includes(name)) return;
  arr.push(name);
  renderFilterTags(filterKey);
  renderHistory();
}

function removeFilterTag(name, filterKey) {
  const arr = filterKey === 'mySelFilter' ? mySelFilter : oppSelFilter;
  const idx = arr.indexOf(name);
  if (idx >= 0) arr.splice(idx, 1);
  renderFilterTags(filterKey);
  renderHistory();
}

function renderFilterTags(filterKey) {
  const arr = filterKey === 'mySelFilter' ? mySelFilter : oppSelFilter;
  const containerId = filterKey === 'mySelFilter' ? 'my-sel-filter-tags' : 'opp-sel-filter-tags';
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = arr.map(name =>
    `<span class="filter-tag">${name}<button onclick="removeFilterTag('${name}','${filterKey}')" title="削除">×</button></span>`
  ).join('');
}

// ---- PARTIES ----
function renderParties() {
  const grid = document.getElementById('party-grid');
  if (!parties.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🎮</div><p>パーティがまだありません</p><p>右上のボタンから登録してください</p></div>';
    return;
  }
  grid.innerHTML = parties.map(p => `
    <div class="party-card" data-party-id="${p.id}">
      <div class="flex justify-between items-center mb-3">
        <div class="party-name party-edit-trigger" data-party-id="${p.id}" style="cursor:pointer;flex:1">${p.name}</div>
        <button class="btn btn-ghost btn-sm party-delete-btn" data-party-id="${p.id}">削除</button>
      </div>
      <div class="party-pokemon party-edit-trigger" data-party-id="${p.id}" style="cursor:pointer">
        ${p.pokemon.filter(Boolean).map(pk => `<span class="poke-tag">${pk}</span>`).join('')}
      </div>
    </div>
  `).join('');
  // イベント委譲で削除・編集を処理
  grid.querySelectorAll('.party-delete-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      deleteParty(btn.dataset.partyId);
    });
  });
  grid.querySelectorAll('.party-edit-trigger').forEach(el => {
    el.addEventListener('click', () => editParty(el.dataset.partyId));
  });
}

function openPartyModal(id) {
  editingPartyId = id || null;
  const modal = document.getElementById('party-modal');
  document.getElementById('party-modal-title').textContent = id ? 'パーティを編集' : 'パーティを登録';
  const slotsEl = document.getElementById('party-modal-slots');
  slotsEl.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    slotsEl.appendChild(createPokemonSlot('party-modal-slots', i, `${i+1}体目`));
  }
  document.getElementById('party-name-input').value = '';
  if (id) {
    const p = parties.find(x => x.id === id);
    if (p) {
      document.getElementById('party-name-input').value = p.name;
      setSlotValues('party-modal-slots', p.pokemon);
    }
  }
  modal.classList.add('open');
}

function closePartyModal() {
  document.getElementById('party-modal').classList.remove('open');
}

function saveParty() {
  const name = document.getElementById('party-name-input').value.trim();
  if (!name) { alert('パーティ名を入力してください'); return; }
  const pokemon = getSlotValues('party-modal-slots', 6);
  if (!pokemon.some(Boolean)) { alert('少なくとも1体は入力してください'); return; }
  if (editingPartyId) {
    const idx = parties.findIndex(p => p.id === editingPartyId);
    if (idx >= 0) { parties[idx].name = name; parties[idx].pokemon = pokemon; }
  } else {
    if (parties.length >= 50) { alert('パーティは最大50個まで登録できます'); return; }
    parties.push({ id: Date.now().toString(), name, pokemon });
  }
  saveData();
  closePartyModal();
  renderParties();
}

function editParty(id) {
  openPartyModal(id);
}

function deleteParty(id) {
  if (!confirm('このパーティを削除しますか？')) return;
  parties = parties.filter(p => p.id !== id);
  saveData();
  renderParties();
}

// ---- RECORD PAGE ----
function renderRecordPage() {
  const grid = document.getElementById('party-select-grid');
  if (!parties.length) {
    grid.innerHTML = '<div class="empty"><p>先にパーティを登録してください</p></div>';
    document.getElementById('record-form-card').style.display = 'none';
    return;
  }
  grid.innerHTML = parties.map(p => `
    <div class="party-card ${selectedPartyId === p.id ? 'selected' : ''}" onclick="selectPartyForRecord('${p.id}')">
      <div class="party-name">${p.name}</div>
      <div class="party-pokemon">
        ${p.pokemon.filter(Boolean).map(pk => `<span class="poke-tag">${pk}</span>`).join('')}
      </div>
    </div>
  `).join('');

  if (selectedPartyId) showRecordForm();
}

function selectPartyForRecord(id) {
  selectedPartyId = id;
  recordResult = null;
  document.getElementById('btn-win').classList.remove('active');
  document.getElementById('btn-lose').classList.remove('active');
  renderRecordPage();
  showRecordForm();
}

function showRecordForm() {
  const form = document.getElementById('record-form-card');
  form.style.display = 'block';

  // Set datetime
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
  document.getElementById('rec-date').value = local.toISOString().slice(0, 16);

  // 自分のパーティ
  const myParty = parties.find(p => p.id === selectedPartyId);
  const myPokemon = myParty ? myParty.pokemon : [];

  // 相手パーティスロット（フリー入力）
  const oppParty = document.getElementById('opp-party-slots');
  oppParty.innerHTML = '';
  for (let i = 0; i < 6; i++) oppParty.appendChild(createPokemonSlot('opp-party-slots', i, `${i+1}体目`));

  // 相手パーティ入力後に選出プルダウンを更新するため変更検知
  oppParty.querySelectorAll('input[type=text]').forEach(input => {
    input.addEventListener('change', rebuildOppSelectionDropdowns);
    input.addEventListener('blur', rebuildOppSelectionDropdowns);
  });

  // 自分の選出プルダウン（自パーティ6体）
  buildMySelectionDropdowns(myPokemon);

  // 相手の選出プルダウン（初期は空）
  buildOppSelectionDropdowns([]);

  document.getElementById('rec-memo').value = '';
  form.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildMySelectionDropdowns(options) {
  const mySelection = document.getElementById('my-selection-slots');
  mySelection.innerHTML = '';
  for (let i = 0; i < 4; i++) mySelection.appendChild(createSelectionDropdown('my-selection-slots', i, `${i+1}体目`, options));
}

function buildOppSelectionDropdowns(options) {
  const oppSelection = document.getElementById('opp-selection-slots');
  oppSelection.innerHTML = '';
  for (let i = 0; i < 4; i++) oppSelection.appendChild(createSelectionDropdown('opp-selection-slots', i, `${i+1}体目`, options));
}

function rebuildOppSelectionDropdowns() {
  const oppPokemon = getSlotValues('opp-party-slots', 6).filter(Boolean);
  buildOppSelectionDropdowns(oppPokemon);
}

function setResult(r) {
  recordResult = r;
  document.getElementById('btn-win').classList.toggle('active', r === 'win');
  document.getElementById('btn-lose').classList.toggle('active', r === 'lose');
}

function saveRecord() {
  if (!selectedPartyId) { alert('パーティを選択してください'); return; }
  if (!recordResult) { alert('勝敗を選択してください'); return; }
  const oppParty = getSlotValues('opp-party-slots', 6);
  if (!oppParty.some(Boolean)) { alert('相手のパーティを1体以上入力してください'); return; }

  const rec = {
    id: Date.now().toString(),
    partyId: selectedPartyId,
    date: document.getElementById('rec-date').value,
    oppParty,
    mySelection: getSlotValues('my-selection-slots', 4),
    oppSelection: getSlotValues('opp-selection-slots', 4),
    result: recordResult,
    memo: document.getElementById('rec-memo').value.trim()
  };
  records.unshift(rec);
  saveData();
  alert('記録を保存しました！');
  selectedPartyId = null;
  recordResult = null;
  document.getElementById('record-form-card').style.display = 'none';
  renderRecordPage();
}

// ---- HISTORY ----
function renderHistory() {
  // Update filter options
  const filter = document.getElementById('history-filter');
  const current = filter.value;
  filter.innerHTML = '<option value="">すべてのパーティ</option>';
  parties.forEach(p => {
    filter.innerHTML += `<option value="${p.id}" ${current === p.id ? 'selected' : ''}>${p.name}</option>`;
  });
  // プルダウンを最新状態に更新
  updateMySelFilterSelect();
  updateOppSelFilterSelect();

  const filterVal = filter.value;
  const resultFilterVal = document.getElementById('history-result-filter').value;
  let filtered = filterVal ? records.filter(r => r.partyId === filterVal) : records;
  if (resultFilterVal) filtered = filtered.filter(r => r.result === resultFilterVal);
  // 自分の選出ポケモン絞り込み（AND条件）
  if (mySelFilter.length) {
    filtered = filtered.filter(r =>
      mySelFilter.every(name => r.mySelection.includes(name))
    );
  }
  // 相手の選出ポケモン絞り込み（AND条件）
  if (oppSelFilter.length) {
    filtered = filtered.filter(r =>
      oppSelFilter.every(name => r.oppSelection.includes(name))
    );
  }

  // Stats
  const stats = document.getElementById('history-stats');
  if (filtered.length) {
    stats.style.display = 'block';
    const wins = filtered.filter(r => r.result === 'win').length;
    const loses = filtered.filter(r => r.result === 'lose').length;
    document.getElementById('stat-total').textContent = filtered.length;
    document.getElementById('stat-win').textContent = wins;
    document.getElementById('stat-lose').textContent = loses;
    document.getElementById('stat-rate').textContent = Math.round(wins / filtered.length * 100) + '%';
  } else stats.style.display = 'none';

  const list = document.getElementById('history-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>記録がありません</p></div>';
    return;
  }

  list.innerHTML = filtered.map(r => {
    const party = parties.find(p => p.id === r.partyId);
    const dateStr = r.date ? new Date(r.date).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    const mySelList = r.mySelection.filter(Boolean);
    const oppPartyList = r.oppParty.filter(Boolean);
    const oppSelList = r.oppSelection.filter(Boolean);
    const isWin = r.result === 'win';

    const tagRow = (arr, color, filterArr) => arr.length
      ? arr.map(p => {
          const isHighlight = filterArr && filterArr.includes(p);
          const bg = isHighlight ? 'rgba(108,99,255,0.55)' : color;
          const border = isHighlight ? '1px solid var(--accent)' : '1px solid transparent';
          return `<span style="font-size:11px;background:${bg};padding:2px 8px;border-radius:20px;white-space:nowrap;border:${border};font-weight:${isHighlight?'700':'400'}">${p}</span>`;
        }).join('')
      : '<span style="font-size:11px;color:var(--text-muted)">なし</span>';

    return `<div class="record-item" onclick="openDetail('${r.id}')" style="border-left:3px solid ${isWin ? 'var(--win)' : 'var(--lose)'}">
      <div class="record-header" style="margin-bottom:10px">
        <span class="${isWin ? 'badge-win' : 'badge-lose'}">${isWin ? '🏆 勝ち' : '💀 負け'}</span>
        <span style="font-weight:600">${party ? party.name : '(削除済み)'}</span>
        <span class="record-date" style="margin-left:auto">${dateStr}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
        <div>
          <div style="color:var(--text-muted);margin-bottom:4px">自分の選出</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px">${tagRow(mySelList, 'rgba(108,99,255,0.25)', mySelFilter)}</div>
        </div>
        <div>
          <div style="color:var(--text-muted);margin-bottom:4px">相手の選出</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px">${tagRow(oppSelList, 'rgba(255,101,132,0.2)', oppSelFilter)}</div>
        </div>
        <div style="grid-column:1/-1">
          <div style="color:var(--text-muted);margin-bottom:4px">相手のパーティ</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px">${tagRow(oppPartyList, 'rgba(255,255,255,0.06)')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ---- DETAIL MODAL ----
function openDetail(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  const party = parties.find(p => p.id === r.partyId);
  const dateStr = r.date ? new Date(r.date).toLocaleString('ja-JP') : '';

  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <span class="${r.result === 'win' ? 'badge-win' : 'badge-lose'}" style="font-size:16px;padding:4px 16px">${r.result === 'win' ? '🏆 勝ち' : '💀 負け'}</span>
      <span style="color:var(--text-muted);font-size:13px">${dateStr}</span>
    </div>
    <div class="detail-section">
      <h4>自分のパーティ</h4>
      <div class="detail-pokemon">
        ${(party ? party.pokemon.filter(Boolean) : []).map(p => `<span class="detail-poke-tag">${p}</span>`).join('') || '<span class="text-muted">(削除済み)</span>'}
      </div>
    </div>
    <div class="detail-section">
      <h4>相手のパーティ（6体）</h4>
      <div class="detail-pokemon">
        ${r.oppParty.filter(Boolean).map(p => `<span class="detail-poke-tag">${p}</span>`).join('') || '<span class="text-muted">記録なし</span>'}
      </div>
    </div>
    <div class="detail-section">
      <h4>自分の選出（4体）</h4>
      <div class="detail-pokemon">
        ${r.mySelection.filter(Boolean).map(p => `<span class="detail-poke-tag">${p}</span>`).join('') || '<span class="text-muted">記録なし</span>'}
      </div>
    </div>
    <div class="detail-section">
      <h4>相手の選出（4体）</h4>
      <div class="detail-pokemon">
        ${r.oppSelection.filter(Boolean).map(p => `<span class="detail-poke-tag">${p}</span>`).join('') || '<span class="text-muted">記録なし</span>'}
      </div>
    </div>
    ${r.memo ? `<div class="detail-section"><h4>メモ</h4><p style="font-size:13px">${r.memo}</p></div>` : ''}
  `;

  document.getElementById('detail-delete-btn').onclick = () => deleteRecord(id);
  document.getElementById('detail-modal').classList.add('open');
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

function deleteRecord(id) {
  if (!confirm('この記録を削除しますか？')) return;
  records = records.filter(r => r.id !== id);
  saveData();
  closeDetailModal();
  renderHistory();
}

// ---- INIT ----
renderParties();

// ---- ピンチズーム無効化（iOS対応）----
document.addEventListener('touchstart', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });

// ---- PWA: Service Worker 登録 ----
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.log('SW error:', e));
  });
}
</script>
