<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">
<title>ポケモン対戦記録</title>
<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, collection, getDocs, deleteDoc, serverTimestamp, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_A_vZgNnCpH6twrLxClD9RPlTF30oguo",
    authDomain: "pokemon-battle-log-9eaf6.firebaseapp.com",
    projectId: "pokemon-battle-log-9eaf6",
    storageBucket: "pokemon-battle-log-9eaf6.firebasestorage.app",
    messagingSenderId: "780559936180",
    appId: "1:780559936180:web:1acdd02ff7a5b2075f05e1"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // グローバルに公開
  window._auth = auth;
  window._db = db;
  window._GoogleAuthProvider = GoogleAuthProvider;
  window._signInWithPopup = signInWithPopup;
  window._signOut = signOut;
  window._onAuthStateChanged = onAuthStateChanged;
  window._firestoreOps = { doc, getDoc, setDoc, collection, getDocs, deleteDoc, serverTimestamp, query, orderBy };
  window._firebaseReady = true;
  document.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #252840;
    --border: #3a3d5c;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --win: #4ade80;
    --lose: #f87171;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; padding-left: max(20px, env(safe-area-inset-left)); padding-right: max(20px, env(safe-area-inset-right)); padding-top: env(safe-area-inset-top); display: flex; align-items: center; gap: 8px; min-height: 56px; position: sticky; top: 0; z-index: 100; }
  nav .logo { font-weight: 700; font-size: 18px; color: var(--accent); margin-right: auto; }
  nav button { background: none; border: none; color: var(--text-muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .2s; }
  nav button.active, nav button:hover { background: var(--accent); color: #fff; }

  /* PAGES */
  .page { display: none; padding: 24px 20px; max-width: 900px; margin: 0 auto; }
  .page.active { display: block; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--accent); }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5851e0; }
  .btn-danger { background: var(--accent2); color: #fff; }
  .btn-danger:hover { background: #e05574; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* FORM */
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 16px; width: 100%; outline: none; transition: border .2s; }
  input:focus, select:focus { border-color: var(--accent); }
  label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; display: block; }

  /* POKEMON SLOT */
  .slot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .slot-grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .pokemon-slot { position: relative; }
  .slot-input-wrap { position: relative; }
  .slot-input-wrap input { border-radius: 8px 0 0 8px !important; border-right:none !important; flex:1; min-width:0; }
  .slot-input-wrap input { padding-right: 32px; }
  .slot-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 2px 4px; }
  .slot-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .autocomplete-list { position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: var(--surface2); border: 1px solid var(--accent); border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 200; display: none; }
  .autocomplete-list.open { display: block; }
  .autocomplete-item { padding: 8px 12px; cursor: pointer; font-size: 13px; transition: background .15s; }
  .autocomplete-item:hover, .autocomplete-item.selected { background: var(--accent); color: #fff; }
  .autocomplete-item .form-tag { font-size: 11px; opacity: .7; }

  /* PARTY LIST */
  .party-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .party-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all .2s; }
  .party-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .party-card.selected { border-color: var(--accent); background: #2a2a50; }
  .party-name { font-weight: 600; margin-bottom: 8px; }
  .party-pokemon { display: flex; flex-wrap: wrap; gap: 4px; }
  .poke-tag { font-size: 11px; background: var(--bg); padding: 2px 8px; border-radius: 20px; color: var(--text-muted); }

  /* RECORD LIST */
  .record-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border .2s; }
  .record-item:hover { border-color: var(--accent); }
  .record-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .badge-win { background: #14532d; color: var(--win); padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .badge-lose { background: #450a0a; color: var(--lose); padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .record-date { font-size: 12px; color: var(--text-muted); }
  .record-detail { font-size: 12px; color: var(--text-muted); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  /* SECTION DIVIDER */
  .section-label { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin: 20px 0 12px; }

  /* RESULT TOGGLE */
  .result-toggle { display: flex; gap: 10px; }
  .result-btn { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 8px; background: none; color: var(--text-muted); cursor: pointer; font-size: 16px; font-weight: 700; transition: all .2s; }
  .result-btn.win.active { border-color: var(--win); background: #14532d; color: var(--win); }
  .result-btn.lose.active { border-color: var(--lose); background: #450a0a; color: var(--lose); }

  /* DETAIL VIEW */
  .detail-section { margin-bottom: 16px; }
  .detail-section h4 { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .detail-pokemon { display: flex; flex-wrap: wrap; gap: 6px; }
  .detail-poke-tag { font-size: 13px; background: var(--surface2); padding: 4px 12px; border-radius: 20px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .flex { display: flex; }
  .gap-2 { gap: 8px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .mb-3 { margin-bottom: 12px; }
  .mb-4 { margin-bottom: 16px; }
  .mt-2 { margin-top: 8px; }
  .text-muted { color: var(--text-muted); font-size: 13px; }
  .count-badge { background: var(--surface2); color: var(--text-muted); font-size: 12px; padding: 2px 8px; border-radius: 20px; }
  .filter-tag { display:inline-flex; align-items:center; gap:5px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:3px 10px; font-size:12px; }
  .filter-tag button { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; line-height:1; padding:0; }
  .filter-tag button:hover { color:var(--accent2); }
  .highlight-tag { background: rgba(108,99,255,0.3) !important; border-color: var(--accent) !important; }
  .dm-list-row { display:flex; align-items:center; gap:10px; padding:8px 16px; border-bottom:1px solid var(--border); }
  .dm-list-row:last-child { border-bottom:none; }
  .dm-list-icon span { display:block; width:40px; height:30px; background-image:url('https://play.pokemonshowdown.com/sprites/pokemonicons-sheet.png'); background-repeat:no-repeat; image-rendering:pixelated; flex-shrink:0; }
  .dm-list-name { flex:1; font-size:13px; }
  .dm-list-check { width:22px; height:22px; cursor:pointer; accent-color:var(--accent); flex-shrink:0; }

  /* ポケモン選択ポップアップ */
  .picker-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:500; display:none; align-items:flex-end; justify-content:center; padding:0; }
  .picker-overlay.open { display:flex; }
  .picker-modal { background:var(--surface); border:1px solid var(--border); border-radius:16px 16px 0 0; width:100%; max-width:600px; height:78vh; display:flex; flex-direction:column; overflow:hidden; }
  .picker-header { padding:12px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .picker-title { font-size:14px; font-weight:700; color:var(--text-muted); margin-bottom:10px; }
  .picker-search { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 12px; font-size:16px; outline:none; }
  .picker-search:focus { border-color:var(--accent); }
  .picker-types { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .type-btn { border:none; border-radius:8px; width:48px; height:48px; flex-shrink:0; font-size:12px; font-weight:700; cursor:pointer; color:#fff; opacity:0.6; transition:opacity .15s; display:flex; align-items:center; justify-content:center; }
  .type-btn.active { opacity:1; box-shadow:0 0 0 2px #fff; }
  .picker-body { flex:1; overflow-y:auto; padding:10px; }
  .picker-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(56px,1fr)); gap:4px; }
  .poke-icon-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 2px; border:none; background:var(--surface2); border-radius:8px; cursor:pointer; transition:background .15s; min-width:0; }
  .poke-icon-btn:hover, .poke-icon-btn.selected { background:var(--accent); }
  .poke-icon-sprite { width:40px; height:30px; overflow:hidden; flex-shrink:0; }
  .poke-icon-sprite span { display:block; width:40px; height:30px; background-image:url('https://play.pokemonshowdown.com/sprites/pokemonicons-sheet.png'); background-repeat:no-repeat; image-rendering:pixelated; }
  .poke-icon-name { font-size:9px; color:var(--text); line-height:1.2; text-align:center; word-break:break-all; width:52px; }
  .poke-icon-btn:hover .poke-icon-name, .poke-icon-btn.selected .poke-icon-name { color:#fff; }
  .picker-empty { text-align:center; color:var(--text-muted); padding:40px; font-size:14px; }
  /* 入力欄にピッカー開くボタン追加 */
  .slot-picker-btn { display:flex; align-items:center; justify-content:center; width:100%; height:48px; background:var(--bg); border:none; cursor:pointer; padding:0; border-radius:8px 8px 0 0; transition:opacity .15s; }
  .slot-picker-btn:hover { opacity:0.7; }
  .slot-picker-btn img { width:40px; height:40px; display:block; object-fit:contain; mix-blend-mode:lighten; }
  .slot-picker-btn .poke-sprite { display:block; width:40px; height:30px; background-image:url('https://play.pokemonshowdown.com/sprites/pokemonicons-sheet.png'); background-repeat:no-repeat; image-rendering:pixelated; }

  /* タイプカラー */
  .type-btn[data-type="ノーマル"]  { background:#9e9e9e; }
  .type-btn[data-type="ほのお"]    { background:#e8622e; }
  .type-btn[data-type="みず"]      { background:#3a8fd1; }
  .type-btn[data-type="でんき"]    { background:#e0b022; }
  .type-btn[data-type="くさ"]      { background:#5a9e32; }
  .type-btn[data-type="こおり"]    { background:#5aafc8; }
  .type-btn[data-type="かくとう"]  { background:#c4501e; }
  .type-btn[data-type="どく"]      { background:#8c3a8c; }
  .type-btn[data-type="じめん"]    { background:#b8963c; }
  .type-btn[data-type="ひこう"]    { background:#7a8ecd; }
  .type-btn[data-type="エスパー"]  { background:#d43078; }
  .type-btn[data-type="むし"]      { background:#8ea820; }
  .type-btn[data-type="いわ"]      { background:#b0962a; }
  .type-btn[data-type="ゴースト"]  { background:#5a4578; }
  .type-btn[data-type="ドラゴン"]  { background:#5038c8; }
  .type-btn[data-type="あく"]      { background:#2c2840; }
  .type-btn[data-type="はがね"]    { background:#8e9eb8; }
  .type-btn[data-type="フェアリー"]{ background:#e87890; }

  /* ポケモンアイコン表示（履歴・パーティ） */
  .poke-tag-icon { display:inline-flex; flex-direction:column; align-items:center; gap:1px; vertical-align:top; }
  .poke-tag-sprite { display:block; width:40px; height:30px;
    background-image:url('https://play.pokemonshowdown.com/sprites/pokemonicons-sheet.png');
    background-repeat:no-repeat; image-rendering:pixelated; }
  .poke-tag-label { font-size:8px; color:var(--text); text-align:center; width:40px;
    overflow:hidden; white-space:nowrap; text-overflow:ellipsis; line-height:1.2; }
  .poke-tags-wrap { display:flex; flex-wrap:wrap; gap:4px; }
</style>
</head>
<body>

<nav>
  <span class="logo">⚔️ 対戦記録</span>
  <button class="active" onclick="showPage('parties')">パーティ管理</button>
  <button onclick="showPage('record')">記録する</button>
  <button onclick="showPage('history')">履歴</button>
  <button onclick="showPage('datamanage')">データ管理</button>
  <div id="auth-area" style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <span id="user-name" style="font-size:12px;color:var(--text-muted)"></span>
    <button id="auth-btn" class="btn btn-ghost btn-sm" onclick="toggleAuth()">ログイン</button>
  </div>
</nav>
<!-- ログインバナー -->
<div id="login-banner" style="background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;text-align:center;display:none">
  <span style="color:var(--text-muted);font-size:14px">Googleアカウントでログインするとデータがクラウドに保存され、どの端末からでもアクセスできます。</span>
  <button class="btn btn-primary btn-sm" onclick="toggleAuth()" style="margin-left:12px">Googleでログイン</button>
</div>

<!-- PARTIES PAGE -->
<div id="page-parties" class="page active">
  <div class="flex justify-between items-center mb-4">
    <div>
      <h2 style="font-size:20px;font-weight:700">自分のパーティ</h2>
      <p class="text-muted mt-2">最大50個まで登録できます</p>
    </div>
    <button class="btn btn-primary" onclick="openPartyModal()">＋ 新規登録</button>
  </div>
  <div id="party-grid" class="party-grid"></div>
</div>

<!-- RECORD PAGE -->
<div id="page-record" class="page">
  <h2 style="font-size:20px;font-weight:700;margin-bottom:20px">対戦を記録する</h2>

  <div class="card">
    <div class="card-title">自分のパーティを選択</div>
    <select id="party-select-dropdown" style="font-size:16px" onchange="onPartyDropdownChange(this.value)">
      <option value="">-- パーティを選択 --</option>
    </select>
  </div>

  <div class="card" id="record-form-card" style="display:none">
    <div class="section-label">自分のパーティ</div>
    <div id="my-party-icons" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>

    <div class="section-label">日時</div>
    <input type="datetime-local" id="rec-date" style="max-width:260px">

    <div class="section-label">相手のパーティ（6体）</div>
    <div class="slot-grid" id="opp-party-slots"></div>

    <div class="section-label">自分の選出（4体）</div>
    <div class="slot-grid-4" id="my-selection-slots"></div>

    <div class="section-label">相手の選出（4体）</div>
    <div class="slot-grid-4" id="opp-selection-slots"></div>

    <div class="section-label">勝敗</div>
    <div class="result-toggle">
      <button class="result-btn win" id="btn-win" onclick="setResult('win')">🏆 勝ち</button>
      <button class="result-btn lose" id="btn-lose" onclick="setResult('lose')">💀 負け</button>
    </div>

    <div style="margin-top:20px">
      <label>メモ（任意）</label>
      <textarea id="rec-memo" rows="3" placeholder="特記事項など..."></textarea>
    </div>

    <div style="margin-top:20px;text-align:right">
      <button class="btn btn-primary" onclick="saveRecord()">💾 記録を保存</button>
    </div>
  </div>
</div>

<!-- HISTORY PAGE -->
<div id="page-history" class="page">
  <div class="flex justify-between items-center mb-4">
    <h2 style="font-size:20px;font-weight:700">対戦履歴</h2>
  </div>

  <div class="card mb-4">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div>
        <label>パーティで絞り込み</label>
        <select id="history-filter" onchange="renderHistory()">
          <option value="">すべてのパーティ</option>
        </select>
      </div>
      <div>
        <label>勝敗で絞り込み</label>
        <select id="history-result-filter" onchange="renderHistory()">
          <option value="">すべて</option>
          <option value="win">勝ち</option>
          <option value="lose">負け</option>
        </select>
      </div>
    </div>
    <div style="margin-bottom:10px">
      <label>自分の選出ポケモンで絞り込み
        <span id="my-sel-filter-hint" style="color:var(--text-muted);font-weight:400;font-size:11px">（パーティを先に選択してください）</span>
      </label>
      <select id="my-sel-filter-select" onchange="addFilterTagFromSelect(this,'mySelFilter')" disabled>
        <option value="">-- 選択 --</option>
      </select>
      <div id="my-sel-filter-tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
    </div>
    <div>
      <label>相手の選出ポケモンで絞り込み
        <span style="color:var(--text-muted);font-weight:400;font-size:11px">（記録済みの試合から）</span>
      </label>
      <select id="opp-sel-filter-select" onchange="addFilterTagFromSelect(this,'oppSelFilter')">
        <option value="">-- 選択 --</option>
      </select>
      <div id="opp-sel-filter-tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
    </div>
  </div>

  <div id="history-stats" class="card mb-4" style="display:none">
    <div class="flex gap-2" style="flex-wrap:wrap">
      <div style="flex:1;text-align:center">
        <div style="font-size:28px;font-weight:700" id="stat-total">0</div>
        <div class="text-muted">試合</div>
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--win)" id="stat-win">0</div>
        <div class="text-muted">勝ち</div>
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--lose)" id="stat-lose">0</div>
        <div class="text-muted">負け</div>
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--accent)" id="stat-rate">-</div>
        <div class="text-muted">勝率</div>
      </div>
    </div>
  </div>

大きな爆発で自分の周りにいるものを攻撃する。使ったあとにひんしになる。", "effect": "User faints, even if the attack fails or misses.  Inflicts regular damage."}, {"name": "みだれひっかき", "type": "ノーマル", "category": "ぶつり", "power": "18", "pp": "15", "desc": "ツメやカマなどで相手をひっかいて攻撃する。２ー５回のあいだ連続でだす。", "effect": "Inflicts regular damage.  Hits 2–5 times in one turn.\n\nHas a 3/8 chance each to hit 2 or 3 times, and a 1/8 chance each to hit 4 or 5 times.  Averages to 3 hits per use."}, {"name": "ホネブーメラン", "type": "じめん", "category": "ぶつり", "power": "50", "pp": "10", "desc": "手に持ったホネを相手に投げつけ行きと帰りの２回連続でダメージを与える。", "effect": "Inflicts regular damage.  Hits twice in one turn."}, {"name": "ねむる", "type": "エスパー", "category": "へんか", "power": "", "pp": "5", "desc": "２ターンのあいだ眠り続ける。自分のＨＰと状態異常をすべて回復する。", "effect": "User falls to sleep and immediately regains all its HP.  If the user has another major status effect, sleep will replace it.  The user will always wake up after two turns, or one turn with early bird.\n\nThis move fails if the Pokémon cannot fall asleep due to uproar, insomnia, or vital spirit.  It also fails if the Pokémon is at full health or is already asleep."}, {"name": "いわなだれ", "type": "いわ", "category": "ぶつり", "power": "75", "pp": "10", "desc": "大きな岩を激しくぶつけて攻撃する。相手をひるませることがある。", "effect": "Inflicts regular damage.  Has a 30% chance to make the target flinch."}, {"name": "ひっさつまえば", "type": "ノーマル", "category": "ぶつり", "power": "80", "pp": "15", "desc": "鋭い前歯で強くかみついて攻撃する。相手をひるませることがある。", "effect": "Inflicts regular damage.  Has a 10% chance to make the target flinch."}, {"name": "かくばる", "type": "ノーマル", "category": "へんか", "power": "", "pp": "30", "desc": "体のかどを増やしてカクカクになることで自分の攻撃をあげる。", "effect": "Raises the user's Attack by one stage."}, {"name": "テクスチャー", "type": "ノーマル", "category": "へんか", "power": "", "pp": "30", "desc": "自分のタイプをおぼえている技で一番上の技と同じタイプにする。", "effect": "User's type changes to the type of one of its moves, selected at random.  hidden power and weather ball are treated as normal.  Only moves with a different type are eligible, and curse is never eligible.  If the user has no suitable moves, this move will fail."}, {"name": "トライアタック", "type": "ノーマル", "category": "とくしゅ", "power": "80", "pp": "10", "desc": "３つの光線で攻撃する。まひかやけどかこおり状態のどれかにすることがある。", "effect": "Inflicts regular damage.  Has a 20% chance to burn, freeze, or paralyze the target.  One of these effects is selected at random; they do not each have independent chances to occur."}, {"name": "いかりのまえば", "type": "ノーマル", "category": "ぶつり", "power": "", "pp": "10", "desc": "鋭い前歯で激しくかみついて攻撃する。相手のＨＰは半分になる。", "effect": "Inflicts typeless damage equal to half the target's remaining HP."}, {"name": "きりさく", "type": "ノーマル", "category": "ぶつり", "power": "70", "pp": "20", "desc": "ツメやカマなどで相手を切り裂いて攻撃する。急所に当たりやすい。", "effect": "Inflicts regular damage.  User's critical hit rate is one level higher when using this move."}, {"name": "みがわり", "type": "ノーマル", "category": "へんか", "power": "", "pp": "10", "desc": "自分のＨＰを少し削って分身をだす。分身は自分の身代わりになる。", "effect": "Transfers 1/4 the user's max HP into a doll that absorbs damage and causes most negative move effects to fail.  If the user leaves the field, the doll will vanish.  If the user cannot pay the HP cost, this move will fail.\n\nThe doll takes damage as normal, using the user's stats and types, and will break when its HP reaches zero.  Self-inflicted damage from confusion or recoil is not absorbed.  Healing effects from opponents ignore the doll and heal the user as normal.  Moves that work based on the user's HP still do so; the doll's HP does not influence any move.\n\nThe doll will block major status effects, confusion, and flinching.  The effects of smelling salts and wake up slap do not trigger against a doll, even if the Pokémon behind the doll has the appropriate major status effect.  Multi-turn trapping moves like wrap will hit the doll for their regular damage, but the multi-turn trapping and damage effects will not activate.\n\nMoves blocked or damage absorbed by the doll do not count as hitting the user or inflicting damage for any effects that respond to such, e.g., avalanche, counter, or a rowap berry.  magic coat still works as normal, even against moves the doll would block.  Opposing Pokémon that damage the doll with a leech move like absorb are healed as normal.\n\nIt will also block acupressure, block, the curse effect of curse, dream eater, embargo, flatter, gastro acid, grudge, heal block, leech seed, lock on, mean look, mimic, mind reader, nightmare, pain split, psycho shift, spider web, sketch, swagger, switcheroo, trick, worry seed, and yawn.  A Pokémon affected by yawn before summoning the doll will still fall to sleep.\n\nThe doll blocks intimidate, but all other abilities act as though the doll did not exist.  If the user has an ability that absorbs moves of a certain type for HP (such as volt absorb absorbing thunder wave), such moves will not be blocked.\n\nlife orb and berries that cause confusion still work as normal, but their respective HP loss and confusion are absorbed/blocked by the doll.\n\nThe user is still vulnerable to damage inflicted when entering or leaving the field, such as by pursuit or spikes; however, the doll will block the poison effect of toxic spikes.\n\nThe doll is passed on by baton pass.  It keeps its existing HP, but uses the replacement Pokémon's stats and types for damage calculation.\n\nAll other effects work as normal."}, {"name": "わるあがき", "type": "ノーマル", "category": "ぶつり", "power": "50", "pp": "1", "desc": "自分のＰＰがなくなるとあがいて相手を攻撃する。自分も少しダメージを受ける。", "effect": "Inflicts typeless regular damage.  User takes 1/4 its max HP in recoil.  Ignores accuracy and evasion modifiers.\n\nThis move is used automatically when a Pokémon cannot use any other move legally, e.g., due to having no PP remaining or being under the effect of both encore and torment at the same time.\n\nThis move's recoil is not treated as recoil for the purposes of anything that affects recoil, such as the ability rock head.  It also is not prevented by magic guard.\n\nThis move cannot be copied by mimic, mirror move, or sketch, nor selected by assist or metronome, nor forced by encore."}, {"name": "スケッチ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "1", "desc": "相手が使った技を自分のものにする。１回使うとスケッチは消える。", "effect": "Permanently replaces itself with the target's last used move.  If that move is chatter or struggle, this move will fail.\n\nThis move cannot be copied by mimic or mirror move, nor selected by assist or metronome, nor forced by encore."}, {"name": "トリプルキック", "type": "かくとう", "category": "ぶつり", "power": "10", "pp": "10", "desc": "３回連続でキックをくりだして攻撃する。技が当たるたびに威力はあがる。", "effect": "Inflicts regular damage.  Hits three times in the same turn.  The second hit has double power, and the third hit has triple power.  Each hit has a separate accuracy check, and this move stops if a hit misses.\n\nskill link does not apply."}, {"name": "どろぼう", "type": "あく", "category": "ぶつり", "power": "60", "pp": "25", "desc": "攻撃と同時に道具を盗む。自分が道具を持っている場合は盗めない。", "effect": "Inflicts regular damage.  If the target is holding an item and the user is not, the user will permanently take the item.  Damage is still inflicted if an item cannot be taken.\n\nPokémon with sticky hold or multitype are immune to the item theft effect.\n\nThe target cannot recover its item with recycle.\n\nThis move cannot be selected by assist or metronome."}, {"name": "クモのす", "type": "むし", "category": "へんか", "power": "", "pp": "10", "desc": "ネバネバした細い糸をグルグルとからませて相手を戦闘から逃げられなくする。", "effect": "The target cannot switch out normally.  Ignores accuracy and evasion modifiers.  This effect ends when the user leaves the field.\n\nThe target may still escape by using baton pass, u turn, or a shed shell.\n\nBoth the user and the target pass on this effect with baton pass."}, {"name": "こころのめ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "5", "desc": "相手の動きを心で感じて次の攻撃が必ず相手に当たるようにする。", "effect": "If the user targets the same target again before the end of the next turn, the move it uses is guaranteed to hit.  This move itself also ignores accuracy and evasion modifiers.\n\nOne-hit KO moves are also guaranteed to hit, as long as the user is equal or higher level than the target.  This effect also allows the user to hit Pokémon that are off the field due to moves such as dig or fly.\n\nIf the target uses detect or protect while under the effect of this move, the user is not guaranteed to hit, but has a (100 - accuracy)% chance to break through the protection.\n\nThis effect is passed on by baton pass."}, {"name": "あくむ", "type": "ゴースト", "category": "へんか", "power": "", "pp": "15", "desc": "眠り状態の相手に悪夢をみせて毎ターン少しずつＨＰを減らしていく。", "effect": "Only works on sleeping Pokémon.  Gives the target a nightmare, damaging it for 1/4 its max HP every turn.  If the target wakes up or leaves the field, this effect ends."}, {"name": "かえんぐるま", "type": "ほのお", "category": "ぶつり", "power": "60", "pp": "25", "desc": "炎をまとい相手に突進して攻撃する。やけど状態にすることがある。", "effect": "Inflicts regular damage.  Has a 10% chance to burn the target.  Frozen Pokémon may use this move, in which case they will thaw."}, {"name": "いびき", "type": "ノーマル", "category": "とくしゅ", "power": "50", "pp": "15", "desc": "自分が寝ているときに雑音をだして攻撃する。相手をひるませることがある。", "effect": "Only usable if the user is sleeping.  Inflicts regular damage.  Has a 30% chance to make the target flinch."}, {"name": "のろい", "type": "ゴースト", "category": "へんか", "power": "", "pp": "10", "desc": "使うポケモンがゴーストタイプとそれ以外とでは効果が変わる。", "effect": "If the user is a ghost: user pays half its max HP to place a curse on the target, damaging it for 1/4 its max HP every turn.\nOtherwise: Lowers the user's Speed by one stage, and raises its Attack and Defense by one stage each.\n\nThe curse effect is passed on by baton pass.\n\nThis move cannot be copied by mirror move."}, {"name": "じたばた", "type": "ノーマル", "category": "ぶつり", "power": "", "pp": "15", "desc": "じたばた暴れて攻撃する。自分のＨＰが少ないほど技の威力はあがる。", "effect": "Inflicts regular damage.  Power category": "とくしゅ", "power": "40", "pp": "25", "desc": "冷たい粉雪を相手に吹きつけて攻撃する。こおり状態にすることがある。", "effect": "Inflicts regular damage.  Has a 10% chance to freeze the target."}, {"name": "まもる", "type": "ノーマル", "category": "へんか", "power": "", "pp": "10", "desc": "相手の攻撃をまったく受けない。連続でだすと失敗しやすい。", "effect": "No moves will hit the user for the remainder of this turn.  If the user is last to act this turn, this move will fail.\n\nIf the user successfully used detect, endure, protect, quick guard, or wide guard on the last turn, this move has a 50% chance to fail.\n\nlock on, mind reader, and no guard provide a (100 – accuracy)% chance for moves to break through this move.  This does not apply to one-hit KO moves (fissure, guillotine, horn drill, and sheer cold); those are always blocked by this move.\n\nthunder during rain dance and blizzard during hail have a 30% chance to break through this move.\n\nThe following effects are not prevented by this move:\n\n* acupressure from an ally\n* curse's curse effect\n* Delayed damage from doom desire and future sight; however, these moves will be prevented if they are used this turn\n* feint, which will also end this move's protection after it hits\n* imprison\n* perish song\n* shadow force\n* Moves that merely copy the user, such as transform or psych up\n\nThis move cannot be selected by assist or metronome."}, {"name": "マッハパンチ", "type": "かくとう", "category": "ぶつり", "power": "40", "pp": "30", "desc": "目にも留まらぬものすごい速さでパンチをくりだす。必ず先制攻撃できる。", "effect": "Inflicts regular damage."}, {"name": "こわいかお", "type": "ノーマル", "category": "へんか", "power": "", "pp": "10", "desc": "恐ろしい顔でにらみおびえさせて相手の素早さをがくっとさげる。", "effect": "Lowers the target's Speed by two stages."}, {"name": "だましうち", "type": "あく", "category": "ぶつり", "power": "60", "pp": "20", "desc": "さりげなく相手にちかづき油断したすきをみてなぐりつける。攻撃は必ず命中する。", "effect": "Inflicts regular damage.  Ignores accuracy and evasion modifiers."}, {"name": "てんしのキッス", "type": "フェアリー", "category": "へんか", "power": "", "pp": "10", "desc": rd during hail have a 30% chance to break through this move.\n\nThe following effects are not prevented by this move:\n\n* acupressure from an ally\n* curse's curse effect\n* Delayed damage from doom desire and future sight; however, these moves will be prevented if they are used this turn\n* feint, which will also end this move's protection after it hits\n* imprison\n* perish song\n* shadow force\n* Moves that merely copy the user, such as transform or psych up\n\nThis move cannot be selected by assist or metronome."}, {"name": "ボーンラッシュ", "type": "じめん", "category": "ぶつり", "power": "25", "pp": "10", "desc": "硬いホネで相手をなぐりつけて攻撃する。２ー５回のあいだ連続でだす。", "effect": "Inflicts regular damage.  Hits 2–5 times in one turn.\n\nHas a 3/8 chance each to hit 2 or 3 times, and a 1/8 chance each to hit 4 or 5 times.  Averages to 3 hits per use."}, {"name": "ロックオン", "type": "ノーマル", "category": "へんか", "power": "", "pp": "5", "desc": "照準をしっかりあわせて次の攻撃が必ず相手に当たるようにする。", "effect": "If the user targets the same target again before the end of the next turn, the move it uses is guaranteed to hit.  This move itself also ignores accuracy and evasion modifiers.\n\nOne-hit KO moves are also guaranteed to hit, as long as the user is equal or higher level than the target.  This effect also allows the user to hit Pokémon that are off the field due to moves such as dig or fly.\n\nIf the target uses detect or protect while under the effect of this move, the user is not guaranteed to hit, but has a (100 - accuracy)% chance to break through the protection.\n\nThis effect is passed on by baton pass."}, {"name": "げきりん", "type": "ドラゴン", "category": "ぶつり", "power": "120", "pp": "10", "desc": "２ー３ターンのあいだ暴れまくって攻撃する。暴れたあとは混乱する。", "effect": "Inflicts regular damage.  User is forced to attack with this move for 2–3 turns,selected at random.  After the last hit, the user becomes confused.\n\nsafeguard does not protect against the confusion from this move."}, {"name": "すなあらし", "type": "いわ", "category": "へんか", "power": "", "pp": "10", "desc": "５ターンのあいだ砂あらしでいわじめんはがねタイプ以外のポケモンにダメージを与える。", "effect": "Changes the weather to a sandstorm for five turns.  Pokémon that are not ground, rock, or steel take 1/16 their max HP at the end of every turn.  Every rock Pokémon's original Special Defense is raised by 50% for the duration of this effect.\n\nsolar beam's power is halved.\n\nmoonlight, morning sun, and synthesis only heal 1/4 the user's max HP."}, {"name": "ギガドレイン", "type": "くさ", "category": "とくしゅ", "power": "75", "pp": "10", "desc": "養分を吸い取り攻撃する。与えたダメージの半分のＨＰを回復できる。", "effect": "Inflicts regular damage.  Drains half the damage inflicted to heal the user."}, {"name": "こらえる", "type": "ノーマル", "category": "へんか", "power": "", "pp": "10", "desc": "攻撃を受けてもＨＰを必ず１だけ残せる。連続でだすと失敗しやすい。", "effect": "The user's HP cannot be lowered below 1 by any means for the remainder of this turn.\n\nIf the user successfully used detect, endure, protect, quick guard, or wide guard on the last turn, this move has a 50% chance to fail.\n\nThis move cannot be selected by assist or metronome."}, {"name": "あまえる", "type": "フェアリー", "category": "へんか", "power": "", "pp": "20", "desc": "かわいくみつめて油断を誘い相手の攻撃をがくっとさげる。", "effect": "Lowers the target's Attack by two stages."}, {"name": "ころがる", "type": "いわ", "category": "ぶつり", "power": "30", "pp": "20", "desc": "５ターンのあいだ転がり続けて攻撃する。技が当たるたびに威力があがる。", "effect": "Inflicts regular damage.  User is forced to use this move for five turns.  Power doubles every time this move is used in succession to a maximum of 16x, and resets to normal after the lock-in ends.  If this move misses or becomes unusable, the lock-in ends.\n\nIf the user has used defense curl since entering the field, this move has double power."}, {"name": "みねうち", "type": "ノーマル", "category": "ぶつり", "power": "40", "pp": "40", "desc": "相手のＨＰが必ず１だけ残るように手加減して攻撃する。", "effect": "Inflicts regular damage.  Will not reduce the target's HP below 1."}, {"name": "いばる", "type": "ノーマル", "category": "へんか", "power": "", "pp": "15", "desc": "相手を怒らせて混乱させる。怒りで相手の攻撃はぐーんとあがってしまう。", "effect": "Raises the target's Attack by two stages, then confuses it.  If the target's Attack cannot be raised by two stages, the confusion is not applied."}, {"name": "ミルクのみ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "5", "desc": "最大ＨＰの半分自分のＨＰを回復する。仲間にＨＰをわけることもできる。", "effect": "Heals the user for half its max HP."}, {"name": "スパーク", "type": "でんき", "category": "ぶつり", "power": "65", "pp": "20", "desc": "電気をまとい相手に突進して攻撃する。まひ状態にすることがある。", "effect": "Inflicts regular damage.  Has a 30% chance to paralyze the target."}, {"name": "れんぞくぎり", "type": "むし", "category": "ぶつり", "power": "40", "pp": "20", "desc": "カマやツメなどで相手を切りつけて攻撃する。連続で当てると威力があがる。", "effect": "Inflicts regular damage.  Power doubles after every time this move is used, whether consecutively or not, maxing out at 16x.  If this move misses or the user leaves the field, power resets."}, {"name": "はがねのつばさ", "type": "はがね", "category": "ぶつり", "power": "70", "pp": "25", "desc": "硬い翼を相手にたたきつけて攻撃する。自分の防御があがることがある。", "effect": "Inflicts regular damage. Has a 10% chance to raise the user's Defense one stage."}, {"name": "くろいまなざし", "type": "ノーマル", "category": "へんか", "power": "", "pp": "5", "desc": "吸いこまれるような黒いまなざしでじっとみつめて相手を戦闘から逃げられなくする。", "effect": "The target cannot switch out normally.  Ignores accuracy and evasion modifiers.  This effect ends when the user leaves the field.\n\nThe target may still escape by using baton pass, u turn, or a shed shell.\n\nBoth the user and the target pass on this effect with baton pass."}, {"name": "メロメロ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "15", "desc": "♂なら♀を♀なら♂を誘惑してメロメロにする。相手は技がだしにくくなる。", "effect": "Causes the target to fall in love with the user, giving it a 50% chance to do nothing each turn.  If the user and target are the same gender, or either is genderless, this move will fail.  If either Pokémon leaves the field, this effect ends."}, {"name": "ねごと", "type": "ノーマル", "category": "へんか", "power": "", "pp": "10", "desc": "自分がおぼえている技のうちどれか１つをくりだす。自分が寝ているときだけ使える。", "effect": "Only usable if the user is sleeping.  Randomly selects and uses one of the user's other three moves.  Use of the selected move requires and costs 0 PP.\n\nThis move will not select assist, bide, bounce, chatter, copycat, dig, dive, fly, focus punch, me first, metronome, mirror move, shadow force, skull bash, sky attack, sky drop, sleep talk, solar beam, razor wind, or uproar.\n\nIf the selected move requires a recharge turn—i.e., one of blast burn, frenzy plant, giga impact, hydro cannon, hyper beam, roar of time, or rock wrecker—and the user is still sleeping next turn, then it's forced to use this move again and pay another PP for the recharge turn.\n\nThis move cannot be copied by mirror move, nor selected by assist, metronome, or sleep talk."}, {"name": "いやしのすず", "type": "ノーマル", "category": "へんか", "power": "", "pp": "5", "desc": "心地好い鈴の音色を聞かせて味方全員の状態異常を回復する。", "effect": "Removes major status effects and confusion from every Pokémon in the user's party."}, {"name": "おんがえし", "type": "ノーマル", "category": "ぶつり", "power": "", "pp": "20", "desc": "トレーナーのために全力で相手を攻撃する。なついているほど威力はあがる。", "effect": "Inflicts regular damage.  Power increases with happiness, given by `happiness * 2 / 5`, to a maximum of 102.  Power bottoms out at 1."}, {"name": "プレゼント", "type": "ノーマル", "category": "ぶつり", "power": "", "pp": "15", "desc": "わなをしかけた箱を相手にわたして攻撃する。ＨＰが回復してしまうこともある。", "effect": "Randomly uses one of the following effects.\n\nEffect                                             | Chance\n-------------------------------------------------- | -----:\nInflicts regular damage with 40 power  |    40%\nInflicts regular damage with 80 power  |    30%\nInflicts regular damage with 120 power |    10%\nHeals the target for 1/4 its max HP    |    20%\n\nOn average, this move inflicts regular damage with 52 power and heals the target for 1/20 its max HP."}, {"name": "やつあたり", "type": "ノーマル", "category": "ぶつり", "power": "", "pp": "20", "desc": "不満をはらすため全力で相手を攻撃する。なついていないほど威力はあがる。", "effect": "Inflicts regular damage.  Power increases inversely with happiness, given by `(255 - happiness) * 2 / 5`, to a maximum of 102.  Power bottoms out at 1."}, {"name": "しんぴのまもり", "type": "ノーマル", "category": "へんか", "power": "", "pp": "25", "desc": "５ターンのあいだ不思議な力に守られて状態異常にならなくなる。", "effect": "Protects Pokémon on the user's side of the field from major status effects and confusion for five turns.  Does not cancel existing ailments.  This effect remains even if the user leaves the field.\n\nIf yawn is used while this move is in effect, it will immediately fail.\n\ndefog used by an opponent will end this effect.\n\nThis effect does not prevent the confusion caused by outrage, petal dance, or thrash."}, {"name": "いたみわけ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "自分のＨＰと相手のＨＰをあわせてそれを自分と相手でなかよくわける。", "effect": "Changes the user's and target's remaining HP to the average of their current remaining HP.  Ignores accuracy and evasion modifiers.  This effect does not count as inflicting damage for other moves and effects that respond to damage taken.\n\nThis effect fails against a substitute."}, {"name": "せいなるほのお", "type": "ほのお", "category": "ぶつり", "power": "100", "pp": "5", "desc": "神秘の炎で相手を焼きつくして攻撃する。やけど状態にすることがある。", "effect": "Inflicts regular damage.  Has a 50% chance to burn the target.  Frozen Pokémon may use this move, in which case they will thaw."}, {"name": "マグニチュード", "type": "じめん", "category": "ぶつり", "power": "", "pp": "30", "desc": "地面を揺らして自分の周りにいるものを攻撃する。技の威力はいろいろ変わる。", "effect": "Inflicts regular damage.  Power is selected at random between 10 and 150, with an average of 71:\n\nMagnitude | Power | Chance\n--------: | ----: | -----:\n        4 |    10 |     5%\n        5 |    30 |    10%\n        6 |    50 |    20%\n        7 |    70 |    30%\n        8 |    90 |    20%\n        9 |   110 |    10%\n       10 |   150 |     5%\n\nThis move has double power against Pokémon currently underground due to dig."}, {"name": "ばくれつパンチ", "type": "かくとう", "category": "ぶつり", "power": "100", "pp": "5", "desc": "こん身の力でパンチをくりだして攻撃する。相手を必ず混乱させる。", "effect": "Inflicts regular damage.  Has a 100% chance to confuse the target."}, {"name": "メガホーン", "type": "むし", "category": "ぶつり", "power": "120", "pp": "10", "desc": "硬くてりっぱなつのでおもいっきり相手を突き刺して攻撃する。", "effect": "Inflicts regular damage."}, {"name": "りゅうのいぶき", "type": "ドラゴン", "category": "とくしゅ", "power": "60", "pp": "20", "desc": "ものすごい息を相手に吹きつけて攻撃する。まひ状態にすることがある。", "effect": "Inflicts regular damage.  Has a 30% chance to paralyze the target."}, {"name": "バトンタッチ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "40", "desc": "控えのポケモンと入れ替わる。能力変化は替わったポケモンがそのまま受けつぐ。", "effect": "User switches out, and the trainer selects a replacement Pokémon from the party.  Stat changes, confusion, and persistent move effects are passed along to the replacement Pokémon.\n\nThe following move effects are passed:\n\n* aqua ring\n* both the user's and target's effect of block, mean look, and spider web\n* the curse effect of curse\n* embargo\n* focus energy or an activated lansat berry\n* gastro acid\n* ingrain\n* being sapped by leech seed\n* being targeted by lock on or mind reader\n* magnet rise\n* perish song's counter\n* power trick\n* substitute; the doll's HP is unchanged\n\nThe replacement Pokémon does not trigger effects that respond to Pokémon switching in."}, {"name": "アンコール", "type": "ノーマル", "category": "へんか", "power": "", "pp": "5", "desc": "相手が最後に使った技を３ターンのあいだずっとださせる。", "effect": "The next 4–8 times (selected at random) the target attempts to move, it is forced to repeat its last used move.  If the selected move allows the trainer to select a target, an opponent will be selected at random each turn.  If the target is prevented from using the selected move by some other effect, struggle will be used instead.  This effect ends if the selected move runs out of PP.\n\nIf the target hasn't used a move since entering the field, if it tried to use a move this turn and failed, if it does not know the selected move, or if the selected move has 0 PP remaining, this move will fail.  If the target's last used move was encore, mimic, mirror move, sketch, struggle, or transform, this move will fail."}, {"name": "おいうち", "type": "あく", "category": "ぶつり", "power": "40", "pp": "20", "desc": "相手ポケモンが入れ替わるときに技をだしていると倍の威力で攻撃できる。", "effect": "Inflicts regular damage.  If the target attempts to switch out this turn before the user acts, this move hits the target before it leaves and has double power.\n\nThis effect can still hit a Pokémon that switches out when it has a substitute up or when an ally has used follow me."}, {"name": "こうそくスピン", "type": "ノーマル", "category": "ぶつり", "power": "50", "pp": "40", "desc": "回転して相手を攻撃する。しめつけるまきつくやどりぎのタネまきびしなども吹きとばせる。", "effect": "Inflicts regular damage.  Removes leech seed from the user, frees the user from bind, clamp, fire spin, magma storm, sand tomb, whirlpool, and wrap, and clears spikes, stealth rock, and toxic spikes from the user's side of the field.  If this move misses or has no effect, its effect doesn't activate."}, {"name": "あまいかおり", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "香りで相手の回避率をがくっとさげる。草むらなどで使うとポケモンがよってくる。", "effect": "Lowers the target's evasion by one stage."}, {"name": "アイアンテール", "type": "はがね", "category": "ぶつり", "power": "100", "pp": "15", "desc": "硬いしっぽで相手をたたきつけて攻撃する。相手の防御をさげることがある。", "effect": "Inflicts regular damage.  Has a 30% chance to lower the target's Defense by one stage."}, {"name": "メタルクロー", "type": "はがね", "category": "ぶつり", "power": "50", "pp": "35", "desc": "鋼鉄のツメで相手を切り裂いて攻撃する。自分の攻撃があがることがある。", "effect": "Inflicts regular damage. Has a 10% chance to raise the user's Attack one stage."}, {"name": "あてみなげ", "type": "かくとう", "category": "ぶつり", "power": "70", "pp": "10", "desc": "相手よりあとに攻撃する。そのかわり自分の攻撃は必ず命中する。", "effect": "Inflicts regular damage.  Ignores accuracy and evasion modifiers."}, {"name": "あさのひざし", "type": "ノーマル", "category": "へんか", "power": "", "pp": "5", "desc": "自分のＨＰを回復する。天気によって回復の量が変化する。", "effect": "Heals the user for half its max HP.\n\nDuring sunny day, the healing is increased to 2/3 max HP.\n\nDuring hail, rain dance, or sandstorm, the healing is decreased to 1/4 max HP."}, {"name": "こうごうせい", "type": "くさ", "category": "へんか", "power": "", "pp": "5", "desc": "自分のＨＰを回復する。天気によって回復の量が変化する。", "effect": "Heals the user for half its max HP.\n\nDuring sunny day, the healing is increased to 2/3 max HP.\n\nDuring hail, rain dance, or sandstorm, the healing is decreased to 1/4 max HP."}, {"name": "つきのひかり", "type": "フェアリー", "category": "へんか", "power": "", "pp": "5", "desc": "自分のＨＰを回復する。天気によって回復の量が変化する。", "effect": "Heals the user for half its max HP.\n\nDuring sunny day, the healing is increased to 2/3 max HP.\n\nDuring hail, rain dance, or sandstorm, the healing is decreased to 1/4 max HP."}, {"name": "めざめるパワー", "type": "ノーマル", "category": "とくしゅ", "power": "60", "pp": "15", "desc": "技を使ったポケモンによって技のタイプが変わる。", "effect": "Inflicts regular damage.  Power and type are determined by the user's IVs.\n\nPower is given by `x * 40 / 63 + 30`.  `x` is obtained by arranging bit 1 from the IV for each of Special Defense, Special Attack, Speed, Defense, Attack, and HP in that order.  (Bit 1 is 1 if the IV is of the form `4n + 2` or `4n + 3`.  `x` is then 64 * Special Defense IV bit 1, plus 32 * Special Attack IV bit 1, etc.)\n\nPower is always between 30 and 70, inclusive.  Average power is 49.5.\n\nType is given by `y * 15 / 63`, where `y` is similar to `x` above, except constructed from bit 0.  (Bit 0 is 1 if the IV is odd.)  The result is looked up in the following table.\n\nValue | Type\n----: | --------\n    0 | fighting\n    1 | flying\n    2 | poison\n    3 | ground\n    4 | rock\n    5 | bug\n    6 | ghost\n    7 | steel\n    8 | fire\n    9 | water\n   10 | grass\n   11 | electric\n   12 | psychic\n   13 | ice\n   14 | dragon\n   15 | dark\n\nThis move thus cannot be normal.  Most other types have an equal 1/16 chance to be selected, given random IVs.  However, due to the flooring used here, bug, fighting, and grass appear 5/64 of the time, and dark only 1/64 of the time."}, {"name": "クロスチョップ", "type": "かくとう", "category": "ぶつり", "power": "100", "pp": "5", "desc": "両手チョップを相手にたたきつけて攻撃する。急所に当たりやすい。", "effect": "Inflicts regular damage.  User's critical hit rate is one level higher when using this move."}, {"name": "たつまき", "type": "ドラゴン", "category": "とくしゅ", "power": "40", "pp": "20", "desc": "竜巻をおこして相手をまきこみ攻撃する。相手をひるませることがある。", "effect": "Inflicts regular damage.  Has a 20% chance to make each target flinch.\n\nIf the target is under the effect of bounce, fly, or sky drop, this move will hit with double power."}, {"name": "あまごい", "type": "みず", "category": "へんか", "power": "", "pp": "5", "desc": "５ターンのあいだ雨を降らせてみずタイプの技の威力をあげる。", "effect": "Changes the weather to rain for five turns, during which water moves inflict 50% extra damage, and fire moves inflict half damage.\n\nIf the user is holding damp rock, this effect lasts for eight turns.\n\nthunder has 100% accuracy.  If the target has used detect or protect, thunder has a (100 - accuracy)% chance to break through the protection.\n\nsolar beam has half power.\n\nmoonlight, morning sun, and synthesis heal only 1/4 of the user's max HP.\n\nPokémon with swift swim have doubled original Speed.\n\nPokémon with forecast become water.\n\nPokémon with dry skin heal 1/8 max HP, Pokémon with hydration are cured of major status effects, and Pokémon with rain dish heal 1/16 max HP at the end of each turn."}, {"name": "にほんばれ", "type": "ほのお", "category": "へんか", "power": "", "pp": "5", "desc": "５ターンのあいだ日差しを強くしてほのおタイプの技の威力をあげる。", "effect": "Changes the weather to sunshine for five turns, during which fire moves inflict 50% extra damage, and water moves inflict half damage.\n\nIf the user is holding heat rock, this effect lasts for eight turns.\n\nPokémon cannot become frozen.\n\nthunder has 50% accuracy.\n\nsolar beam skips its charge turn.\n\nmoonlight, morning sun, and synthesis heal 2/3 of the user's max HP.\n\nPokémon with chlorophyll have doubled original Speed.\n\nPokémon with forecast become fire.\n\nPokémon with leaf guard are not affected by major status effects.\n\nPokémon with flower gift change form; every Pokémon on their side of the field have their original Attack and Special Attack increased by 50%.\n\nPokémon with dry skin lose 1/8 max HP at the end of each turn.\n\nPokémon with solar power have their original Special Attack raised by 50% but lose 1/8 their max HP at the end of each turn."}, {"name": "かみくだく", "type": "あく", "category": "ぶつり", "power": "80", "pp": "15", "desc": "鋭い歯で相手をかみくだいて攻撃する。相手の防御をさげることがある。", "effect": "Inflicts regular damage.  Has a 20% chance to lower the target's Defense by one stage."}, {"name": "ミラーコート", "type": "エスパー", "category": "とくしゅ", "power": "", "pp": "20", "desc": "相手から受けた特殊攻撃のダメージを２倍にしてその相手に返す。", "effect": "Targets the last opposing Pokémon to hit the user with a special move this turn.  Inflicts twice the damage that move did to the user.  If there is no eligible target, this move will fail.  Type immunity applies, but other type effects are ignored.\n\nThis move cannot be copied by mirror move, nor selected by assist or metronome."}, {"name": "じこあんじ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "10", "desc": "自分に暗示をかけることで能力変化の状態を相手と同じにする。", "effect": "Discards the user's stat changes and copies the target's.\n\nThis move cannot be copied by mirror move."}, {"name": "しんそく", "type": "ノーマル", "category": "ぶつり", "power": "80", "pp": "5", "desc": "目にも留まらぬものすごい速さで相手に突進して攻撃する。必ず先制攻撃できる。", "effect": "Inflicts regular damage."}, {"name": "げんしのちから", "type": "いわ", "category": "とくしゅ", "power": "60", "pp": "5", "desc": "原始の力で攻撃する。自分のすべての能力があがることがある。", "effect": "Inflicts regular damage. Has a 10% chance to raise all of the user's stats one stage."}, {"name": "シャドーボール", "type": "ゴースト", "category": "とくしゅ", "power": "80", "pp": "15", "desc": "黒い影の塊を投げつけて攻撃する。相手の特防をさげることがある。", "effect": "Inflicts regular damage.  Has a 20% chance to lower the target's Special Defense by one stage."}, {"name": "みらいよち", "type": "エスパー", "category": "とくしゅ", "power": "120", "pp": "10", "desc": "技を使った２ターン後に相手に念力の塊を送って攻撃する。", "effect": "Inflicts typeless regular damage at the end of the third turn, starting with this one.  This move cannot score a critical hit.  If the target switches out, its replacement will be hit instead.  Damage is calculated at the time this move is used; stat changes and switching out during the delay won't change the damage inflicted.  No move with this effect can be used against the same target again until after the end of the third turn.\n\nThis effect breaks through wonder guard.\n\nIf the target is protected by protect or detect on the turn this move is used, this move will fail.  However, the damage on the third turn will break through protection.\n\nThe damage is applied at the end of the turn, so it ignores endure and focus sash.\n\nThis move cannot be copied by mirror move."}, {"name": "いわくだき", "type": "かくとう", "category": "ぶつり", "power": "40", "pp": "15", "desc": "パンチで攻撃する。相手の防御をさげることがある。岩を砕くこともある。", "effect": "Inflicts regular damage.  Has a 50% chance to lower the target's Defense by one stage."}, {"name": "うずしお", "type": "みず", "category": "とくしゅ", "power": "35", "pp": "15", "desc": "激しく渦をまく水の中に４ー５ターンのあいだ相手を閉じこめて攻撃する。", "effect": "Inflicts regular damage.  For the next 2–5 turns, the target cannot leave the field and is damaged for 1/16 its max HP at the end of each turn.  The user continues to use other moves during this time.  If the user leaves the field, this effect ends.\n\nHas a 3/8 chance each to hit 2 or 3 times, and a 1/8 chance each to hit 4 or 5 times.  Averages to 3 hits per use.\n\nIf the target is in the first turn of dive, this move will hit with double power."}, {"name": "ふくろだたき", "type": "あく", "category": "ぶつり", "power": "", "pp": "10", "desc": "味方全員で攻撃する。仲間のポケモンが多いほど技の攻撃回数が増える。", "effect": "Inflicts typeless regular damage.  Every Pokémon in the user's party, excepting those that have fainted or have a major status effect, attacks the target.  Calculated stats are ignored; the base stats for the target and assorted attackers are used instead.  The random factor in the damage formula is not used.  dark Pokémon still get STAB.\n\nThis effect breaks through wonder guard."}, {"name": "ねこだまし", "type": "ノーマル", "category": "ぶつり", "power": "40", "pp": "10", "desc": "先制攻撃で相手をひるませる。戦闘にでたらすぐにださないと成功しない。", "effect": "Inflicts regular damage.  Causes the target to flinch.  Can only be used on the user's first turn after entering the field."}, {"name": "さわぐ", "type": "ノーマル", "category": "とくしゅ", "power": "90", "pp": "10", "desc": "３ターンのあいだ騒いで相手を攻撃する。そのあいだはだれも眠れなくなる。", "effect": "Inflicts regular damage.  User is forced to use this move for 2–5 turns, selected at random.  All Pokémon on the field wake up, and none can fall to sleep until the lock-in ends.\n\nPokémon cannot use rest during this effect.\n\nThis move cannot be selected by sleep talk."}, {"name": "たくわえる", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "力を蓄えて自分の防御と特防をあげる。最大３回まで蓄えられる。", "effect": "Raises the user's Defense and Special Defense by one stage each.  Stores energy for use with spit up and swallow.  Up to three levels of energy can be stored, and all are lost if the user leaves the field.  Energy is still stored even if the stat boosts cannot be applied.\n\nIf the user uses baton pass, the stat boosts are passed as normal, but the stored energy is not."}, {"name": "はきだす", "type": "ノーマル", "category": "とくしゅ", "power": "", "pp": "10", "desc": "蓄えた力を相手にぶつけて攻撃する。蓄えているほど威力があがる。", "effect": "Inflicts regular damage.  Power is equal to 100 times the amount of energy stored by stockpile.  Ignores the random factor in the damage formula.  Stored energy is consumed, and the user's Defense and Special Defense are reset to what they would be if stockpile had not been used.  If the user has no energy stored, this move will fail.\n\nThis move cannot be copied by mirror move."}, {"name": "のみこむ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "10", "desc": "蓄えた力をのみこんで自分のＨＰを回復する。蓄えているほど回復する。", "effect": "Heals the user depending on the amount of energy stored by stockpile: 1/4 its max HP after one use, 1/2 its max HP after two uses, or fully after three uses.  Stored energy is consumed, and the user's Defense and Special Defense are reset to what they would be if stockpile had not been used.  If the user has no energy stored, this move will fail."}, {"name": "ねっぷう", "type": "ほのお", "category": "とくしゅ", "power": "95", "pp": "10", "desc": "熱い息を相手に吹きつけて攻撃する。やけど状態にすることがある。", "effect": "Inflicts regular damage.  Has a 10% chance to burn the target."}, {"name": "あられ", "type": "こおり", "category": "へんか", "power": "", "pp": "10", "desc": "５ターンのあいだあられを降らしてこおりタイプでないポケモン全員にダメージを与える。", "effect": "Changes the weather to hail for five turns, during which non-ice Pokémon are damaged for 1/16 their max HP at the end of every turn.\n\nIf the user is holding icy rock, this effect lasts for eight turns.\n\nblizzard has 100% accuracy.  If the target has used detect or protect, blizzard has a (100 - accuracy)% chance to break through the protection.\n\nmoonlight, morning sun, and synthesis heal only 1/4 of the user's max HP.\n\nPokémon with snow cloak are exempt from this effect's damage."}, {"name": "いちゃもん", "type": "あく", "category": "へんか", "power": "", "pp": "15", "desc": "相手にいちゃもんをつけて同じ技を２回連続でだせなくする。", "effect": "Prevents the target from attempting to use the same move twice in a row.  When the target leaves the field, this effect ends.\n\nIf the target is forced to attempt a repeated move due to choice band, choice scarf, choice specs, disable, encore, taunt, only having PP remaining for one move, or any other effect, the target will use struggle instead.  The target is then free to use the forced move next turn, as it didn't use that move this turn."}, {"name": "おだてる", "type": "あく", "category": "へんか", "power": "", "pp": "15", "desc": "相手をおだてて混乱させる。同時に相手の特攻もあげてしまう。", "effect": "Raises the target's Special Attack by one stage, then confuses it."}, {"name": "おにび", "type": "ほのお", "category": "へんか", "power": "", "pp": "15", "desc": "不気味で怪しい炎を放って相手をやけどの状態にする。", "effect": "Burns the target."}, {"name": "おきみやげ", "type": "あく", "category": "へんか", "power": "", "pp": "10", "desc": "自分はひんしになるがそのかわりに相手の攻撃と特攻をがくっとさげる。", "effect": "Lowers the target's Attack and Special Attack by two stages.  User faints."}, {"name": "からげんき", "type": "ノーマル", "category": "ぶつり", "power": "70", "pp": "20", "desc": "自分が毒まひやけど状態のとき相手にくりだすと技の威力が２倍になる。", "effect": "Inflicts regular damage.  If the user is burned, paralyzed, or poisoned, this move has double power."}, {"name": "きあいパンチ", "type": "かくとう", "category": "ぶつり", "power": "150", "pp": "20", "desc": "精神を高めてパンチをくりだす。技をだすまでに攻撃を受けると失敗する。", "effect": "Inflicts regular damage.  If the user takes damage this turn before hitting, this move will fail.\n\nThis move cannot be copied by mirror move, nor selected by assist, metronome, or sleep talk."}, {"name": "きつけ", "type": "ノーマル", "category": "ぶつり", "power": "70", "pp": "10", "desc": "まひ状態の相手には威力が２倍になるがかわりに相手のまひが治る。", "effect": "Inflicts regular damage.  If the target is paralyzed, this move has double power, and the target is cured of its paralysis."}, {"name": "このゆびとまれ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "自分に注目させて相手からの攻撃をすべて自分にむけさせる。", "effect": "Until the end of this turn, any moves that opposing Pokémon target solely at the user's ally will instead target the user.  If both Pokémon on the same side of the field use this move on the same turn, the Pokémon that uses it last will become the target.\n\nThis effect takes priority over lightning rod and storm drain.\n\nIf the user's ally switches out, opposing Pokémon may still hit it with pursuit.\n\nThis move cannot be selected by assist or metronome."}, {"name": "しぜんのちから", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "自然の力で攻撃する。使う場所ででてくる技が変化する。", "effect": "Uses another move chosen according to the terrain.\n\nTerrain                   | Selected move\n------------------------- | ------------------\nBuilding                  | tri attack\nCave                      | rock slide\nDeep water                | hydro pump\nDesert                    | earthquake\nGrass                     | seed bomb\nMountain                  | rock slide\nRoad                      | earthquake\nShallow water             | hydro pump\nSnow                      | blizzard\nTall grass                | seed bomb\nelectric terrain | thunderbolt\ngrassy terrain   | energy ball\nmisty terrain    | moonblast\n\nIn Pokémon Battle Revolution:\n\nTerrain        | Selected move\n-------------- | ------------------\nCourtyard      | tri attack\nCrystal        | rock slide\nGateway        | hydro pump\nMagma          | rock slide\nMain Street    | tri attack\nNeon           | tri attack\nStargazer      | rock slide\nSunny Park     | seed bomb\nSunset         | earthquake\nWaterfall      | seed bomb\n\nThis move cannot be copied by mirror move."}, {"name": "じゅうでん", "type": "でんき", "category": "へんか", "power": "", "pp": "20", "desc": "次のターンにだすでんきタイプの技の威力をあげる。自分の特防もあがる。", "effect": "Raises the user's Special Defense by one stage.  If the user uses an electric move next turn, its power will be doubled."}, {"name": "ちょうはつ", "type": "あく", "category": "へんか", "power": "", "pp": "20", "desc": "相手を怒らせる。３ターンのあいだ相手はダメージを与える技しかだせなくなる。", "effect": "Target is forced to only use damaging moves for the next 3–5 turns, selected at random.  Moves that select other moves not known in advance do not count as damaging.\n\nassist, copycat, me first, metronome, mirror move, and sleep talk do not directly inflict damage and thus may not be used.\n\nbide, counter, endeavor, metal burst, and mirror coat are allowed."}, {"name": "てだすけ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "仲間を助ける。てだすけされたポケモンの技の威力はいつもより大きくなる。", "effect": "Boosts the power of the target's moves by 50% until the end of this turn.\n\nThis move cannot be copied by mirror move, nor selected by assist or metronome."}, {"name": "トリック", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "相手のすきをついて自分と相手の持ち物を交換する。", "effect": "User and target permanently swap held items.  Works even if one of the Pokémon isn't holding anything.  If either Pokémon is holding mail, this move will fail.\n\nIf either Pokémon has multitype or sticky hold, this move will fail.\n\nIf this move results in a Pokémon obtaining choice band, choice scarf, or choice specs, and that Pokémon was the latter of the pair to move this turn, then the move it used this turn becomes its chosen forced move.  This applies even if both Pokémon had a choice item before this move was used.  If the first of the two Pokémon gains a choice item, it may select whatever choice move it wishes next turn.\n\nNeither the user nor the target can recover its item with recycle.\n\nThis move cannot be selected by assist or metronome."}, {"name": "なりきり", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "相手になりきって自分も相手と同じ特性に変化する。", "effect": "User's ability is replaced with the target's until the user leaves the field.  Ignores accuracy and evasion modifiers.\n\nIf the target has flower gift, forecast, illusion, imposter, multitype, stance change, trace, wonder guard, or zen mode, this move will fail.\n\nThis move cannot be copied by mirror move."}, {"name": "ねがいごと", "type": "ノーマル", "category": "へんか", "power": "", "pp": "10", "desc": "次のターンに自分のＨＰを最大ＨＰの半分回復する。", "effect": "At the end of the next turn, user will be healed for half its max HP.  If the user is switched out, its replacement will be healed instead for half of the user's max HP.  If the user faints or is forcefully switched by roar or whirlwind, this effect will not activate."}, {"name": "ねこのて", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "大急ぎで味方の助けをかりて控えのポケモンがおぼえている技をどれか１つ使う。", "effect": "Uses a move from another Pokémon in the user's party, both selected at random.  Moves from fainted Pokémon can be used.  If there are no eligible Pokémon or moves, this move will fail.\n\nThis move will not select assist, chatter, circle throw, copycat, counter, covet, destiny bond, detect, dig, dive, dragon tail, endure, feint, fly focus punch, follow me, helping hand, me first, metronome, mimic, mirror coat, mirror move, phantom force protect, quick guard, roar shadow force, sketch, sleep talk, snatch, struggle, switcheroo, thief, trick, whirlwind, or wide guard.\n\nThis move cannot be copied by mirror move, nor selected by metronome or sleep talk."}, {"name": "ねをはる", "type": "くさ", "category": "へんか", "power": "", "pp": "20", "desc": "大地に根を張り毎ターン自分のＨＰを回復する。根を張っているので入れ替えられない。", "effect": "Prevents the user from switching out.  User regains 1/16 of its max HP at the end of every turn.  If the user was immune to ground attacks, it will now take normal damage from them.\n\nroar and whirlwind will not affect the user.  The user cannot use magnet rise.\n\nThe user may still use u turn to leave the field.\n\nThis effect can be passed with baton pass."}, {"name": "ばかぢから", "type": "かくとう", "category": "ぶつり", "power": "120", "pp": "5", "desc": "すごい力を発揮して相手を攻撃する。自分の攻撃と防御がさがる。", "effect": "Inflicts regular damage, then lowers the user's Attack and Defense by one stage each."}, {"name": "マジックコート", "type": "エスパー", "category": "へんか", "power": "", "pp": "15", "desc": "状態異常になる技ややどりぎのタネなどをだされたとき相手に跳ね返す。", "effect": "The first non-damaging move targeting the user this turn that inflicts major status effects, stat changes, or trapping effects will be reflected at its user.\n\ndefog, memento, and teeter dance are not reflected.\n\nattract, flatter, gastro acid, leech seed, swagger, worry seed, and yawn are reflected.\n\nThis move cannot be copied by mirror move."}, {"name": "リサイクル", "type": "ノーマル", "category": "へんか", "power": "", "pp": "10", "desc": "戦闘中に使ってなくなった自分の持ち物を再生させて使えるようにする。", "effect": "User recovers the last item consumed by the user or a Pokémon in its position on the field.  The item must be used again before it can be recovered by this move again.  If the user is holding an item, this move fails.\n\nItems taken or given away by covet, knock off, switcheroo, thief, or trick may not be recovered."}, {"name": "リベンジ", "type": "かくとう", "category": "ぶつり", "power": "60", "pp": "10", "desc": "相手から技を受けているとその相手に対して与えるダメージが２倍になる。", "effect": "Inflicts regular damage.  If the target damaged the user this turn and was the last to do so, this move has double power.\n\npain split does not count as damaging the user."}, {"name": "かわらわり", "type": "かくとう", "category": "ぶつり", "power": "75", "pp": "15", "desc": "手刀を勢いよく振りおろして相手を攻撃する。ひかりのかべやリフレクターも破壊できる。", "effect": "Destroys any light screen or reflect on the target's side of the field, then inflicts regular damage."}, {"name": "あくび", "type": "ノーマル", "category": "へんか", "power": "", "pp": "10", "desc": "大きなあくびで眠気を誘う。次のターンに相手を眠り状態にする。", "effect": "Puts the target to sleep at the end of the next turn.  Ignores accuracy and evasion modifiers.  If the target leaves the field, this effect is canceled.  If the target has a status effect when this move is used, this move will fail.\n\nIf the target is protected by safeguard when this move is used, this move will fail.\n\ninsomnia and vital spirit prevent the sleep if the target has either at the end of the next turn, but will not cause this move to fail on use."}, {"name": "はたきおとす", "type": "あく", "category": "ぶつり", "power": "65", "pp": "20", "desc": "相手の持ち物をはたき落として戦闘が終わるまで使えなくする。物を持つ相手にはダメージが増す。", "effect": "Inflicts regular damage.  Target loses its held item.\n\nNeither the user nor the target can recover its item with recycle.\n\nIf the target has multitype or sticky hold, it will take damage but not lose its item."}, {"name": "がむしゃら", "type": "ノーマル", "category": "ぶつり", "power": "", "pp": "5", "desc": "相手のＨＰが自分のＨＰと同じくらいになるようにダメージを与える。", "effect": "Inflicts exactly enough damage to lower the target's HP to equal the user's.  If the target's HP is not higher than the user's, this move has no effect.  Type immunity applies, but other type effects are ignored.  This effect counts as damage for moves that respond to damage."}, {"name": "ふんか", "type": "ほのお", "category": "とくしゅ", "power": "150", "pp": "5", "desc": "怒りを爆発させて相手を攻撃する。自分のＨＰが少ないほど技の威力はさがる。", "effect": "Inflicts regular damage.  Power increases with the user's remaining HP and is given by `150 * HP / max HP`, to a maximum of 150 when the user has full HP."}, {"name": "スキルスワップ", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "超能力で自分の特性と相手の特性を入れ替える。", "effect": "User and target switch abilities.  Ignores accuracy and evasion modifiers.\n\nIf either Pokémon has multitype or wonder guard, this move will fail."}, {"name": "ふういん", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "相手が自分と同じ技をおぼえていたら相手だけその技を使えなくする。", "effect": "Prevents any Pokémon on the opposing side of the field from using any move the user knows until the user leaves the field.  This effect is live; if the user obtains new moves while on the field, these moves become restricted.  If no opposing Pokémon knows any of the user's moves when this move is used, this move will fail."}, {"name": "リフレッシュ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "体をやすめて自分がおっている毒まひやけどの状態異常を治す。", "effect": "Removes a burn, paralysis, or poison from the user."}, {"name": "おんねん", "type": "ゴースト", "category": "へんか", "power": "", "pp": "5", "desc": "相手の技でひんしにされたときおんねんをかけてその技のＰＰを０にする。", "effect": "If the user faints before it next acts, the move that fainted it will have its PP dropped to 0.  End-of-turn damage does not trigger this effect."}, {"name": "よこどり", "type": "あく", "category": "へんか", "power": "", "pp": "10", "desc": "相手が使おうとした回復技や能力変化の Sunny Park     | Puts target to sleep\nSunset         | Lowers target's accuracy by one stage\nWaterfall      | Puts target to sleep\n"}, {"name": "ダイビング", "type": "みず", "category": "ぶつり", "power": "80", "pp": "10", "desc": "１ターン目で潜り２ターン目に浮きあがって攻撃する。", "effect": "Inflicts regular damage.  User dives underwater for one turn, becoming immune to attack, and hits on the second turn.\n\nDuring the immune turn, surf, and whirlpool still hit the user normally, and their power is doubled if appropriate.\n\nThe user may be hit during its immune turn if under the effect of lock on, mind reader, or no guard.\n\nThis move cannot be selected by sleep talk."}, {"name": "つっぱり", "type": "かくとう", "category": "ぶつり", "power": "15", "pp": "20", "desc": "ひらいた両手で相手をつっぱって攻撃する。２ー５回のあいだ連続でだす。", "effect": "Inflicts regular damage.  Hits 2–5 times in one turn.\n\nHas a 3/8 chance each to hit 2 or 3 times, and a 1/8 chance each to hit 4 or 5 times.  Averages to 3 hits per use."}, {"name": "ほごしょく", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "水辺や草むらどうくつなどいる場所にあわせて自分のタイプを変える。", "effect": "User's type changes according to the terrain.\n\nTerrain        | New type\n-------------- | --------------\nBuilding       | normal\nCave           | rock\nDesert         | ground\nGrass          | grass\nMountain       | rock\nOcean          | water\nPond           | water\nRoad           | ground\nSnow           | ice\nTall grass     | grass\n\nIn Pokémon Battle Revolution:\n\nTerrain        | New type\n-------------- | --------------\nCourtyard      | normal\nCrystal        | rock\nGateway        | water\nMagma          | rock\nMain Street    | normal\nNeon           | normal\nStargazer      | rock\nSunny Park     | grass\nSunset         | ground\nWaterfall      | grass\n"}, {"name": "ほたるび", "type": "むし", "category": "へんか", "power": "", "pp": "20", "desc": "点滅する光を眺めて自分の精神を統一し特攻をぐぐーんとあげる。", "effect": "Raises the user's Special Attack by three stages."}, {"name": "ラスターパージ", "type": "エスパ
