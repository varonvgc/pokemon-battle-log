 each to hit 4 or 5 times.  Averages to 3 hits per use.\n\nrapid spin cancels this effect."}, {"name": "ぜったいれいど", "type": "こおり", "category": "とくしゅ", "power": "", "pp": "5", "desc": "絶対零度の冷たさで相手を攻撃する。当たれば一撃でひんしにする。", "effect": "Inflicts damage equal to the target's max HP.  Ignores accuracy and evasion modifiers.  This move's accuracy is 30% plus 1% for each level the user is higher than the target.  If the user is a lower level than the target, this move will fail.\n\nBecause this move inflicts a specific and finite amount of damage, endure still prevents the target from fainting.\n\nThe effects of lock on, mind reader, and no guard still apply, as long as the user is equal or higher level than the target.  However, they will not give this move a chance to break through detect or protect."}, {"name": "だくりゅう", "type": "みず", "category": "とくしゅ", "power": "90", "pp": "10", "desc": "濁った水を相手に発射して攻撃する。命中率をさげることがある。", "effect": "Inflicts regular damage.  Has a 30% chance to lower the target's accuracy by one stage."}, {"name": "タネマシンガン", "type": "くさ", "category": "ぶつり", "power": "25", "pp": "30", "desc": "タネを勢いよく相手に発射して攻撃する。２ー５回のあいだ連続でだす。", "effect": "Inflicts regular damage.  Hits 2–5 times in one turn.\n\nHas a 3/8 chance each to hit 2 or 3 times, and a 1/8 chance each to hit 4 or 5 times.  Averages to 3 hits per use."}, {"name": "つばめがえし", "type": "ひこう", "category": "ぶつり", "power": "60", "pp": "20", "desc": "素早い動きで相手をほんろうして切りつける。攻撃は必ず命中する。", "effect": "Inflicts regular damage.  Ignores accuracy and evasion modifiers."}, {"name": "つららばり", "type": "こおり", "category": "ぶつり", "power": "25", "pp": "30", "desc": "鋭い氷柱を相手に発射して攻撃する。２ー５回のあいだ連続でだす。", "effect": "Inflicts regular damage.  Hits 2–5 times in one turn.\n\nHas a 3/8 chance each to hit 2 or 3 times, and a 1/8 chance each to hit 4 or 5 times.  Averages to 3 hits per use."}, {"name": "てっぺき", "type": "はがね", "category": "へんか", "power": "", "pp": "15", "desc": "皮膚を鉄のように硬くすることで自分の防御をぐーんとあげる。", "effect": "Raises the user's Defense by two stages."}, {"name": "とおせんぼう", "type": "ノーマル", "category": "へんか", "power": "", "pp": "5", "desc": "両手をひろげてたちはだかり相手の逃げ道をふさいで逃げられなくする。", "effect": "The target cannot switch out normally.  Ignores accuracy and evasion modifiers.  This effect ends when the user leaves the field.\n\nThe target may still escape by using baton pass, u turn, or a shed shell.\n\nBoth the user and the target pass on this effect with baton pass."}, {"name": "とおぼえ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "40", "desc": "大声でほえて気合を高め自分の攻撃をあげる。", "effect": "Raises the user's Attack by one stage."}, {"name": "ドラゴンクロー", "type": "ドラゴン", "category": "ぶつり", "power": "80", "pp": "15", "desc": "鋭くとがった巨大なツメで相手を切り裂いて攻撃する。", "effect": "Inflicts regular damage."}, {"name": "ハードプラント", "type": "くさ", "category": "とくしゅ", "power": "150", "pp": "5", "desc": "大きな樹木で相手をたたきつけて攻撃する。次のターンは動けなくなる。", "effect": "Inflicts regular damage.  User loses its next turn to \"recharge\", and cannot attack or switch out during that turn."}, {"name": "ビルドアップ", "type": "かくとう", "category": "へんか", "power": "", "pp": "20", "desc": "体に力をこめて筋肉をぶあつくすることで自分の攻撃と防御をあげる。", "effect": "Raises the user's Attack and Defense by one stage each."}, {"name": "とびはねる", "type": "ひこう", "category": "ぶつり", "power": "85", "pp": "5", "desc": "空高く飛び跳ねて２ターン目に相手を攻撃する。まひ状態にすることがある。", "effect": "Inflicts regular damage.  User bounces high into the air for one turn, becoming immune to attack, and hits on the second turn.  Has a 30% chance to paralyze the target.\n\nDuring the immune turn, gust, hurricane, sky uppercut, smack down, thunder, and twister still hit the user normally.  gust and twister also have double power against the user.\n\nThe damage from hail and sandstorm still applies during the immune turn.\n\nThe user may be hit during its immune turn if under the effect of lock on, mind reader, or no guard.\n\nThis move cannot be used while gravity is in effect.\n\nThis move cannot be selected by sleep talk."}, {"name": "マッドショット", "type": "じめん", "category": "とくしゅ", "power": "55", "pp": "15", "desc": "泥の塊を相手に投げつけて攻撃する。同時に相手の素早さをさげる。", "effect": "Inflicts regular damage.  Has a 100% chance to lower the target's Speed by one stage."}, {"name": "ポイズンテール", "type": "どく", "category": "ぶつり", "power": "50", "pp": "25", "desc": "しっぽでたたく。毒状態にすることがあり急所にも当たりやすい。", "effect": "Inflicts regular damage.  User's critical hit rate is one level higher when using this move. Has a 10% chance to poison the target."}, {"name": "ほしがる", "type": "ノーマル", "category": "ぶつり", "power": "60", "pp": "25", "desc": "かわいくあまえながら相手にちかづき持っている道具をうばう。", "effect": "Inflicts regular damage.  If the target is holding an item and the user is not, the user will permanently take the item.  Damage is still inflicted if an item cannot be taken.\n\nPokémon with sticky hold or multitype are immune to the item theft effect.\n\nThe target cannot recover its item with recycle.\n\nThis move cannot be selected by assist or metronome."}, {"name": "ボルテッカー", "type": "でんき", "category": "ぶつり", "power": "120", "pp": "15", "desc": "電気をまとって突進する。自分もかなりダメージを受ける。まひ状態にすることがある。", "effect": "Inflicts regular damage.  User takes 1/3 the damage it inflicts in recoil.  Has a 10% chance to paralyze the target."}, {"name": "マジカルリーフ", "type": "くさ", "category": "とくしゅ", "power": "60", "pp": "20", "desc": "相手を追跡する不思議なはっぱを まきちらす。攻撃は必ず命中する。", "effect": "Inflicts regular damage.  Ignores accuracy and evasion modifiers."}, {"name": "みずあそび", "type": "みず", "category": "へんか", "power": "", "pp": "15", "desc": "あたりを水でびしょびしょにする。５ターンのあいだほのおタイプの技を弱める。", "effect": "fire moves inflict half damage, regardless of target.  If the user leaves the field, this effect ends."}, {"name": "めいそう", "type": "エスパー", "category": "へんか", "power": "", "pp": "20", "desc": "静かに精神を統一し心を鎮めることで自分の特攻と特防をあげる。", "effect": "Raises the user's Special Attack and Special Defense by one stage each."}, {"name": "リーフブレード", "type": "くさ", "category": "ぶつり", "power": "90", "pp": "15", "desc": "はっぱを剣のようにあやつり相手を切りつけて攻撃する。急所に当たりやすい。", "effect": "Inflicts regular damage.  User's critical hit rate is one level higher when using this move."}, {"name": "りゅうのまい", "type": "ドラゴン", "category": "へんか", "power": "", "pp": "20", "desc": "神秘的で力強い舞を激しくおどる。自分の攻撃と素早さをあげる。", "effect": "Raises the user's Attack and Speed by one stage each."}, {"name": "ロックブラスト", "type": "いわ", "category": "ぶつり", "power": "25", "pp": "10", "desc": "硬い岩石を相手に発射して攻撃する。２ー５回のあいだ連続でだす。", "effect": "Inflicts regular damage.  Hits 2–5 times in one turn.\n\nHas a 3/8 chance each to hit 2 or 3 times, and a 1/8 chance each to hit 4 or 5 times.  Averages to 3 hits per use."}, {"name": "でんげきは", "type": "でんき", "category": "とくしゅ", "power": "60", "pp": "20", "desc": "電撃を素早く相手に浴びせる。攻撃は必ず命中する。", "effect": "Inflicts regular damage.  Ignores accuracy and evasion modifiers."}, {"name": "みずのはどう", "type": "みず", "category": "とくしゅ", "power": "60", "pp": "20", "desc": "水の振動を相手に与えて攻撃する。相手を混乱させることがある。", "effect": "Inflicts regular damage.  Has a 20% chance to confuse the target."}, {"name": "はめつのねがい", "type": "はがね", "category": "とくしゅ", "power": "140", "pp": "5", "desc": "技を使った２ターン後に無数の光の束で相手を攻撃する。", "effect": "Inflicts typeless regular damage at the end of the third turn, starting with this one.  This move cannot score a critical hit.  If the target switches out, its replacement will be hit instead.  Damage is calculated at the time this move is used; stat changes and switching out during the delay won't change the damage inflicted.  No move with this effect can be used against the same target again until after the end of the third turn.\n\nThis effect breaks through wonder guard.\n\nIf the target is protected by protect or detect on the turn this move is used, this move will fail.  However, the damage on the third turn will break through protection.\n\nThe damage is applied at the end of the turn, so it ignores endure and focus sash.\n\nThis move cannot be copied by mirror move."}, {"name": "サイコブースト", "type": "エスパー", "category": "とくしゅ", "power": "140", "pp": "5", "desc": "フルパワーで相手を攻撃する。使うと反動で自分の特攻ががくっとさがる。", "effect": "Inflicts regular damage, then lowers the user's Special Attack by two stages."}, {"name": "はねやすめ", "type": "ひこう", "category": "へんか", "power": "", "pp": "5", "desc": "地面に降りて体をやすめる。最大ＨＰの半分のＨＰを回復する。", "effect": "Heals the user for half its max HP.  If the user is flying, its flying type is ignored until the end of this turn."}, {"name": "じゅうりょく", "type": "エスパー", "category": "へんか", "power": "", "pp": "5", "desc": "５ターンのあいだ重力を強くしてふゆうや空へ飛ぶ技を使えなくする。", "effect": "For five turns (including this one), all immunities to ground moves are disabled.  For the duration of this effect, the evasion of every Pokémon on the field is lowered by two stages.  Cancels the effects of bounce, fly, and sky drop.\n\nSpecifically, flying Pokémon and those with levitate or that have used magnet rise are no longer immune to ground attacks, arena trap, spikes, or toxic spikes.\n\nbounce, fly, sky drop, high jump kick, jump kick, and splash cannot be used while this move is in effect.\n\n*Bug*: If this move is used during a double or triple battle while Pokémon are under the effect of sky drop, Sky Drop's effect is not correctly canceled on its target, and it remains high in the air indefinitely.  As Sky Drop prevents the target from acting, the only way to subsequently remove it from the field is to faint it."}, {"name": "ミラクルアイ", "type": "エスパー", "category": "へんか", "power": "", "pp": "40", "desc": "あくタイプに効果がない技や回避率の高い相手に攻撃が当たるようになる。", "effect": "Resets the target's evasion to normal and prevents any further boosting until the target leaves the field.  A dark Pokémon under this effect takes normal damage from psychic moves.  This move itself ignores accuracy and evasion modifiers."}, {"name": "めざましビンタ", "type": "かくとう", "category": "ぶつり", "power": "70", "pp": "10", "desc": "眠り状態の相手に大きなダメージを与える。かわりに相手は眠りからさめる。", "effect": "Inflicts regular damage.  If the target is sleeping, this move has double power, and the target wakes up."}, {"name": "アームハンマー", "type": "かくとう", "category": "ぶつり", "power": "100", "pp": "10", "desc": "強くて重いこぶしをふるってダメージを与える。自分の素早さがさがる。", "effect": "Inflicts regular damage, then lowers the user's Speed by one stage."}, {"name": "ジャイロボール", "type": "はがね", "category": "ぶつり", "power": "", "pp": "5", "desc": "体を高速に回転させて体当たりする。相手より素早さが低いほど強い。", "effect": "Inflicts regular damage.  Power increases with the target's current Speed compared to the user, given by `1 + 25 * target Speed / user Speed`, capped at 150."}, {"name": "いやしのねがい", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "自分はひんしになるが控えからでてくるポケモンの状態異常とＨＰを回復する。", "effect": "User faints.  Its replacement's HP is fully restored, and any major status effect is removed.  If the replacement Pokémon is immediately fainted by a switch-in effect, the next replacement is healed by this move instead."}, {"name": "しおみず", "type": "みず", "category": "とくしゅ", "power": "65", "pp": "10", "desc": "相手がＨＰの半分くらいきずをおっていると技の威力が２倍になる。", "effect": "Inflicts regular damage.  If the target has less than half its max HP remaining, this move has double power."}, {"name": "しぜんのめぐみ", "type": "ノーマル", "category": "ぶつり", "power": "", "pp": "15", "desc": "きのみから力をもらい攻撃する。持たせたきのみで技のタイプと威力が変わる。", "effect": "Inflicts regular damage.  Power and type are determined by the user's held berry.  The berry is consumed.  If the user is not holding a berry, this move will fail."}, {"name": "フェイント", "type": "ノーマル", "category": "ぶつり", "power": "30", "pp": "10", "desc": "まもるやみきりをしている相手に攻撃ができる。守りの効果を解除させる。", "effect": "Inflicts regular damage.  Removes the effects of detect or protect from the target before hitting.\n\nThis move cannot be copied by mirror move, nor selected by assist or metronome."}, {"name": "ついばむ", "type": "ひこう", "category": "ぶつり", "power": "60", "pp": "20", "desc": "くちばしで攻撃。相手がきのみを持っているとき食べてきのみの効果を受けられる。", "effect": "Inflicts regular damage.  If the target is holding a berry, this move has double power, and the user takes the berry and uses it immediately.\n\nIf the target is holding a jaboca berry or rowap berry, the berry is still removed, but has no effect.\n\nIf this move is super effective and the target is holding a berry that can reduce this move's damage, it will do so, and will not be stolen."}, {"name": "おいかぜ", "type": "ひこう", "category": "へんか", "power": "", "pp": "15", "desc": "激しく吹きあれる風の渦をつくり４ターンのあいだ味方全員の素早さをあげる。", "effect": "For the next three turns, all Pokémon on the user's side of the field have their original Speed doubled.  This effect remains if the user leaves the field."}, {"name": "つぼをつく", "type": "ノーマル", "category": "へんか", "power": "", "pp": "30", "desc": "つぼおしで体を活性化させる。能力のどれか１つをぐーんとあげる。", "effect": "Raises one of the target's stats by two stages.  The raised stat is chosen at random from any stats that can be raised by two stages.  If no stat is eligible, this move will fail.\n\nIf the target has a substitute, this move will have no effect, even if the user is the target.\n\nThis move cannot be copied by mirror move."}, {"name": "メタルバースト", "type": "はがね", "category": "ぶつり", "power": "", "pp": "10", "desc": "技をだす前に最後に受けた技のダメージを大きくしてだした相手に返す。", "effect": "Targets the last opposing Pokémon to hit the user with a damaging move this turn.  Inflicts 1.5× the damage that move did to the user.  If there is no eligible target, this move will fail.  Type immunity applies, but other type effects are ignored."}, {"name": "とんぼがえり", "type": "むし", "category": "ぶつり", "power": "70", "pp": "20", "desc": "攻撃したあとものすごいスピードでもどってきて控えのポケモンと入れ替わる。", "effect": "Inflicts regular damage, then the user immediately switches out, and the trainer selects a replacement Pokémon from the party.  If the target faints from this attack, the user's trainer selects the new Pokémon to send out first.  If the user is the last Pokémon in its party that can battle, it will not switch out.\n\nThe user may be hit by pursuit when it switches out, if it has been targeted and pursuit has not yet been used.\n\nThis move may be used even if the user is under the effect of ingrain.  ingrain's effect will end."}, {"name": "インファイト", "type": "かくとう", "category": "ぶつり", "power": "120", "pp": "5", "desc": "守りを捨てて相手のふところに突撃する。自分の防御と特防がさがる。", "effect": "Inflicts regular damage, then lowers the user's Defense and Special Defense by one stage each."}, {"name": "しっぺがえし", "type": "あく", "category": "ぶつり", "power": "50", "pp": "10", "desc": "ためこんで攻撃する。相手よりあとに攻撃できると技の威力は２倍になる。", "effect": "Inflicts regular damage.  If the target uses a move or switches out this turn before this move is used, this move has double power."}, {"name": "ダメおし", "type": "あく", "category": "ぶつり", "power": "60", "pp": "10", "desc": "そのターンに相手がすでにダメージを受けていたら技の威力は２倍になる。", "effect": "Inflicts regular damage.  If the target takes damage this turn for any reason before this move is used, this move has double power."}, {"name": "さしおさえ", "type": "あく", "category": "へんか", "power": "", "pp": "15", "desc": "持たせた道具を使えなくする。トレーナーもそのポケモンには道具を使えない。", "effect": "Target cannot use its held item for five turns.  If the target leaves the field, this effect ends.\n\nIf a Pokémon under this effect uses bug bite or pluck on a Pokémon holding a berry, the berry is destroyed but not used.  If a Pokémon under this effect uses fling, it will fail.\n\nThis effect is passed by baton pass."}, {"name": "なげつける", "type": "あく", "category": "ぶつり", "power": "", "pp": "10", "desc": "持たせた道具を素早く投げつけて攻撃する。道具で威力と効果が変わる。", "effect": "Inflicts regular damage.  Power and type are determined by the user's held item.  The item is consumed.  If the user is not holding an item, or its item has no set type and power, this move will fail.\n\nThis move ignores sticky hold.\n\nIf the user is under the effect of embargo, this move will fail."}, {"name": "サイコシフト", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "超能力で暗示をかけて自分の受けている状態異常を相手にうつす。", "effect": "If the user has a major status effect and the target does not, the user's status is transferred to the target."}, {"name": "きりふだ", "type": "ノーマル", "category": "とくしゅ", "power": "", "pp": "5", "desc": "きりふだの残りＰＰが少なければ少ないほど技の威力があがる。", "effect": "Inflicts regular damage.  Power is determined by the PP remaining for this move, after its PP cost is deducted.  Ignores accuracy and evasion modifiers.\n\nPP remaining | Power\n------------ | ----:\n4 or more    |    40\n3            |    50\n2            |    60\n1            |    80\n0            |   200\n\nIf this move is activated by another move, the activating move's PP is used to calculate power."}, {"name": "かいふくふうじ", "type": "エスパー", "category": "へんか", "power": "", "pp": "15", "desc": "５ターンのあいだ技や特性や持っている道具によってＨＰを回復できなくする。", "effect": "For the next five turns, the target may not use any moves that only restore HP, and move effects that heal the target are disabled.  Moves that steal HP may still be used, but will only inflict damage and not heal the target."}, {"name": "しぼりとる", "type": "ノーマル", "category": "とくしゅ", "power": "", "pp": "5", "desc": "強く締めあげて攻撃をする。相手のＨＰが残っているほど威力はあがる。", "effect": "Inflicts regular damage.  Power directly relates to the target's relative remaining HP, given by `1 + 120 * current HP / max HP`, to a maximum of 121."}, {"name": "パワートリック", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "超能力で自分の攻撃と防御の力を交換する。", "effect": "The user's original Attack and Defense are swapped.\n\nThis effect is passed on by baton pass."}, {"name": "いえき", "type": "どく", "category": "へんか", "power": "", "pp": "10", "desc": "胃液を相手の体に吐きつける。ついた胃液は相手の特性の効果を消す。", "effect": "The target's ability is disabled as long as it remains on the field.\n\nThis effect is passed on by baton pass."}, {"name": "おまじない", "type": "ノーマル", "category": "へんか", "power": "", "pp": "30", "desc": "天にむかっておいのりをささげ相手の攻撃を急所に当たらなくする。", "effect": "For five turns, opposing Pokémon cannot score critical hits."}, {"name": "さきどり", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "威力をあげて相手がだそうとする技を先にだす。先にだせないと失敗する。", "effect": "If the target has selected a damaging move this turn, the user will copy that move and use it against the target, with a 50% increase in power.\n\nIf the target moves before the user, this move will fail.\n\nThis move cannot be copied by mirror move, nor selected by assist, metronome, or sleep talk."}, {"name": "まねっこ", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "直前にでた技をまねして同じ技をだす。技がでていないと失敗する。", "effect": "Uses the last move that was used successfully by any Pokémon, including the user.\n\nThis move cannot copy itself, nor roar nor whirlwind.\n\nThis move cannot be copied by mirror move, nor selected by assist, metronome, or sleep talk."}, {"name": "パワースワップ", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "超能力で自分と相手の攻撃と特攻の能力変化を入れ替える。", "effect": "User swaps its Attack and Special Attack stat modifiers modifiers with the target."}, {"name": "ガードスワップ", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "超能力で自分と相手の防御と特防の能力変化を入れ替える。", "effect": "User swaps its Defense and Special Defense modifiers with the target."}, {"name": "おしおき", "type": "あく", "category": "ぶつり", "power": "", "pp": "5", "desc": "能力変化で相手がパワーアップしているほど技の威力があがる。", "effect": "Inflicts regular damage.  Power starts at 60 and is increased by 20 for every stage any of the target's stats has been raised, capping at 200.  Accuracy and evasion modifiers do not increase this move's power."}, {"name": "とっておき", "type": "ノーマル", "category": "ぶつり", "power": "140", "pp": "5", "desc": "戦闘中におぼえている技をすべて使うとはじめてだせるとっておきの技。", "effect": "Inflicts regular damage.  This move can only be used if each of the user's other moves has been used at least once since the user entered the field.  If this is the user's only move, this move will fail."}, {"name": "なやみのタネ", "type": "くさ", "category": "へんか", "power": "", "pp": "10", "desc": "心をなやませるタネを植えつける。相手を眠れなくして特性をふみんにする。", "effect": "Changes the target's ability to insomnia.\n\nIf the target's ability is truant or multitype, this : "いわ", "category": "ぶつり", "power": "100", "pp": "5", "desc": "とがった岩を相手に突き刺して攻撃する。急所に当たりやすい。", "effect": "Inflicts regular damage.  User's critical hit rate is one level higher when using this move."}, {"name": "ゆうわく", "type": "ノーマル", "category": "へんか", "power": "", "pp": "20", "desc": "♂なら♀を♀なら♂を誘惑して相手の特攻をがくっとさげる。", "effect": "Lowers the target's Special Attack by two stages.  If the user and target are the same gender, or either is genderless, this move will fail."}, {"name": "ステルスロック", "type": "いわ", "category": "へんか", "power": "", "pp": "20", "desc": "相手の周りに無数の岩を浮かべて交代ででてきた相手のポケモンにダメージを与える。", "effect": "Spreads sharp rocks around the opposing field, damaging any Pokémon that enters the field for 1/8 its max HP.  This damage is affected by the entering Pokémon's susceptibility to rock moves.\n\nrapid spin removes this effect from its user's side of the field."}, {"name": "くさむすび", "type": "くさ", "category": "とくしゅ", "power": "", "pp": "20", "desc": "草をからませて相手を転ばせる。相手が重いほど威力があがる。", "effect": "Inflicts regular damage.  Power increases with the target's weight in kilograms, to a maximum of 120.\n\nTarget's weight | Power\n--------------- | ----:\nUp to 10kg      |    20\nUp to 25kg      |    40\nUp to 50kg      |    60\nUp to 100kg     |    80\nUp to 200kg     |   100\nAbove 200kg     |   120\n"}, {"name": "おしゃべり", "type": "ひこう", "category": "とくしゅ", "power": "65", "pp": "20", "desc": "おぼえた言葉で音波をおこして攻撃する。相手を混乱させる。", "effect": "Inflicts regular damage.  Has either a 1%, 11%, or 31% chance to confuse the target, based on the volume of the recording made for this move; louder recordings increase the chance of confusion.  If the user is not a chatot, this move will not cause confusion.\n\nThis move cannot be copied by mimic, mirror move, or sketch, nor selected by assist, metronome, or sleep talk."}, {"name": "さばきのつぶて", "type": "ノーマル", "category": "とくしゅ", "power": "100", "pp": "10", "desc": "無数の光弾を相手に放出する。自分の持つプレートによりタイプが変わる。", "effect": "Inflicts regular damage.  If the user is holding a plate or a drive, this move's type is the type corresponding to that item.\n\nNote: This effect is technically shared by both techno blast and judgment; however, Techno Blast is only affected by drives, and Judgment is only affected by plates."}, {"name": "むしくい", "type": "むし", "category": "ぶつり", "power": "60", "pp": "20", "desc": "かみついて攻撃する。相手がきのみを持っているとき食べてきのみの効果を受けられる。", "effect": "Inflicts regular damage.  If the target is holding a berry, this move has double power, and the user takes the berry and uses it immediately.\n\nIf the target is holding a jaboca berry or rowap berry, the berry is still removed, but has no effect.\n\nIf this move is super effective and the target is holding a berry that can reduce this move's damage, it will do so, and will not be stolen."}, {"name": "チャージビーム", "type": "でんき", "category": "とくしゅ", "power": "50", "pp": "10", "desc": "電撃の束を相手に発射する。電気をためて自分の特攻をあげることがある。", "effect": "Inflicts regular damage.  Has a 70% chance to raise the user's Special Attack by one stage."}, {"name": "ウッドハンマー", "type": "くさ", "category": "ぶつり", "power": "120", "pp": "15", "desc": "硬い胴体を相手にたたきつけて攻撃する。自分もかなりダメージを受ける。", "effect": "Inflicts regular damage.  User takes 1/3 the damage it inflicts in recoil."}, {"name": "アクアジェット", "type": "みず", "category": "ぶつり", "power": "40", "pp": "20", "desc": "目にも留まらぬものすごい速さで相手につっこむ。必ず先制攻撃できる。", "effect": "Inflicts regular damage."}, {"name": "こうげきしれい", "type": "むし", "category": "ぶつり", "power": "90", "pp": "15", "desc": "しもべを呼びだして相手にむかって攻撃させる。急所に当たりやすい。", "effect": "Inflicts regular damage.  User's critical hit rate is one level higher when using this move."}, {"name": "ぼうぎょしれい", "type": "むし", "category": "へんか", "power": "", "pp": "10", "desc": "しもべを呼びだして自分の体におおいつかせる。防御と特防をあげることができる。", "effect": "Raises the user's Defense and Special Defense by one stage."}, {"name": "かいふくしれい", "type": "むし", "category": "へんか", "power": "", "pp": "10", "desc": "しもべを呼びだしてきずを治す。最大ＨＰの半分自分のＨＰを回復する。", "effect": "Heals the user for half its max HP."}, {"name": "もろはのずつき", "type": "いわ", "category": "ぶつり", "power": "150", "pp": "5", "desc": "命を懸けてこん身の力で相手にずつきをする。自分もものすごいダメージを受ける。", "effect": "Inflicts regular damage.  User takes 1/2 the damage it inflicts in recoil."}, {"name": "ダブルアタック", "type": "ノーマル", "category": "ぶつり", "power": "35", "pp": "10", "desc": "しっぽなどを使い相手をたたいて攻撃する。２回連続でダメージを与える。", "effect": "Inflicts regular damage.  Hits twice in one turn."}, {"name": "ときのほうこう", "type": "ドラゴン", "category": "とくしゅ", "power": "150", "pp": "5", "desc": "時間がゆがむほどの力をうちだして相手を攻撃する。次のターンは動けなくなる。", "effect": "Inflicts regular damage.  User loses its next turn to \"recharge\", and cannot attack or switch out during that turn."}, {"name": "あくうせつだん", "type": "ドラゴン", "category": "とくしゅ", "power": "100", "pp": "5", "desc": "周りの空間ごと相手を引き裂きダメージを与える。急所に当たりやすい。", "effect": "Inflicts regular damage.  User's critical hit rate is one level higher when using this move."}, {"name": "みかづきのまい", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "自分はひんしになるが控えからでてくるポケモンのすべての状態を回復する。", "effect": "User faints.  Its replacement's HP and PP are fully restored, and any major status effect is removed."}, {"name": "にぎりつぶす", "type": "ノーマル", "category": "ぶつり", "power": "", "pp": "5", "desc": "すさまじい力で相手をにぎりつぶす。相手のＨＰが残っているほど威力があがる。", "effect": "Inflicts regular damage.  Power directly relates to the target's relative remaining HP, given by `1 + 120 * current HP / max HP`, to a maximum of 121."}, {"name": "マグマストーム", "type": "ほのお", "category": "とくしゅ", "power": "100", "pp": "5", "desc": "激しく燃えたぎる炎のなかに４ー５ターンのあいだ相手を閉じこめて攻撃する。", "effect": "Inflicts regular damage.  For the next 2–5 turns, the target cannot leave the field and is damaged for 1/16 its max HP at the end of each turn.  The user continues to use other moves during this time.  If the user leaves the field, this effect ends.\n\nHas a 3/8 chance each to hit 2 or 3 times, and a 1/8 chance each to hit 4 or 5 times.  Averages to 3 hits per use.\n\nrapid spin cancels this effect."}, {"name": "ダークホール", "type": "あく", "category": "へんか", "power": "", "pp": "10", "desc": "暗黒の世界にひきずり落として相手を眠り状態にする。", "effect": "Puts the target to sleep."}, {"name": "シードフレア", "type": "くさ", "category": "とくしゅ", "power": "120", "pp": "5", "desc": "体の中から衝撃波を発生させる。相手の特防をがくっとさげることがある。", "effect": "Inflicts regular damage.  Has a 40% chance to lower the target's Special Defense by two stages."}, {"name": "あやしいかぜ", "type": "ゴースト", "category": "とくしゅ", "power": "60", "pp": "5", "desc": "みのけもよだつ突風で相手を攻撃する。自分のすべての能力があがることがある。", "effect": "Inflicts regular damage. Has a 10% chance to raise all of the user's stats one stage."}, {"name": "シャドーダイブ", "type": "ゴースト", "category": "ぶつり", "power": "120", "pp": "5", "desc": "１ターン目で姿を消して２ターン目に相手を攻撃する。守っていても攻撃は当たる。", "effect": "Inflicts regular damage.  User vanishes for one turn, becoming immune to attack, and hits on the second turn.\n\nThis move ignores the effects of detect and protect.\n\nThis move cannot be selected by sleep talk."}, {"name": "つめとぎ", "type": "あく", "category": "へんか", "power": "", "pp": "15", "desc": "ツメを磨いて鋭くする。自分の攻撃と命中率をあげる。", "effect": "Raises the user's Attack and accuracy by one stage."}, {"name": "ワイドガード", "type": "いわ", "category": "へんか", "power": "", "pp": "10", "desc": "味方全員に当たる攻撃を１ターンのあいだ防ぐ。", "effect": "Moves with multiple targets will not hit friendly Pokémon for the remainder of this turn.  If the user is last to act this turn, this move will fail.\n\nThis move cannot be selected by assist or metronome."}, {"name": "ガードシェア", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "超能力で自分と相手の防御と特防をたして半分にわける。", "effect": "Averages the user's unmodified Defense with the target's unmodified Defense; the value becomes the unmodified Defense for both Pokémon. Unmodified Special Defense is averaged the same way."}, {"name": "パワーシェア", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "超能力で自分と相手の攻撃と特攻をたして半分にわける。", "effect": "Averages the user's unmodified Attack with the target's unmodified Attack; the value becomes the unmodified Attack for both Pokémon. Unmodified Special Attack is averaged the same way.\n\nThis effect applies before any other persistent changes to unmodified Attack or Special Attack, such as flower gift during sunny day."}, {"name": "ワンダールーム", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "まか不思議な空間をつくる。５ターンのあいだすべてのポケモンの防御と特防が入れ替わる。", "effect": "For five turns (including this one), every Pokémon's Defense and Special Defense are swapped."}, {"name": "サイコショック", "type": "エスパー", "category": "とくしゅ", "power": "80", "pp": "10", "desc": "不思議な念波を実体化して相手を攻撃する。物理的なダメージを与える。", "effect": "Inflicts regular damage.  Damage calculation always uses the target's Defense, regardless of this move's damage class."}, {"name": "ベノムショック", "type": "どく", "category": "とくしゅ", "power": "65", "pp": "10", "desc": "特殊な毒液を浴びせかける。毒状態の相手には威力が２倍になる。", "effect": "Inflicts regular damage.  If the target is poisoned, this move has double power."}, {"name": "ボディパージ", "type": "はがね", "category": "へんか", "power": "", "pp": "15", "desc": "体のムダな部分を削る。自分の素早さをぐーんとあげて体重も軽くなる。", "effect": "Raises the user's Speed by two stages.  Halves the user's weight; this effect does not stack."}, {"name": "いかりのこな", "type": "むし", "category": "へんか", "power": "", "pp": "20", "desc": "イライラさせる粉を自分にふりかけて注意をひく。相手の攻撃をすべて自分にむける。", "effect": "Until the end of this turn, any moves that opposing Pokémon target solely at the user's ally will instead target the user.  If both Pokémon on the same side of the field use this move on the same turn, the Pokémon that uses it last will become the target.\n\nThis effect takes priority over lightning rod and storm drain.\n\nIf the user's ally switches out, opposing Pokémon may still hit it with pursuit.\n\nThis move cannot be selected by assist or metronome."}, {"name": "テレキネシス", "type": "エスパー", "category": "へんか", "power": "", "pp": "15", "desc": "超能力で相手を浮かせる。３ターンのあいだ攻撃が相手に当たりやすくなる。", "effect": "For three turns (including this one), moves used against the target have 100% accuracy, but the target is immune to ground damage.  Accuracy of one-hit KO moves is exempt from this effect.\n\nThis effect is removed by gravity.  If Gravity is already in effect, this move will fail."}, {"name": "マジックルーム", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "まか不思議な空間をつくる。５ターンのあいだすべてのポケモンの道具の効果がなくなる。", "effect": "For five turns (including this one), passive effects of held items are ignored, and Pokémon will not use their held items."}, {"name": "うちおとす", "type": "いわ", "category": "ぶつり", "power": "50", "pp": "15", "desc": "石や弾を投げて飛んでいる相手を攻撃する。相手はうち落とされて地面に落ちる。", "effect": "Inflicts regular damage.  Removes the target's immunity to ground-type damage.  This effect removes any existing Ground immunity due to levitate, magnet rise, or telekinesis, and causes the target's flying type to be ignored when it takes Ground damage.\n\nIf the target isn't immune to Ground damage, this move will fail.\n\nThis move can hit Pokémon under the effect of bounce, fly, or sky drop, and ends the effect of Bounce or Fly."}, {"name": "やまあらし", "type": "かくとう", "category": "ぶつり", "power": "60", "pp": "10", "desc": "強烈な一撃を相手にくりだす。攻撃は必ず急所に当たる。", "effect": "Inflicts regular damage.  Always scores a critical hit."}, {"name": "はじけるほのお", "type": "ほのお", "category": "とくしゅ", "power": "70", "pp": "15", "desc": "当たるとはじける炎で相手を攻撃する。はじけた炎は隣の相手にもふりかかる。", "effect": "Inflicts regular damage.  If this move successfully hits the target, any Pokémon adjacent to the target are damaged for 1/16 their max HP."}, {"name": "ヘドロウェーブ", "type": "どく", "category": "とくしゅ", "power": "95", "pp": "10", "desc": "ヘドロの波で自分の周りにいるものを攻撃する。毒状態にすることがある。", "effect": "Inflicts regular damage.  Has a 10% chance to poison the target."}, {"name": "ちょうのまい", "type": "むし", "category": "へんか", "power": "", "pp": "20", "desc": "神秘的で美しい舞を軽やかにおどる。自分の特攻と特防と素早さをあげる。", "effect": "Raises the user's Special Attack, Special Defense, and Speed by one stage each."}, {"name": "ヘ ser's Attack, Special Attack, and Speed by two stages each.  Lowers the user's Defense and Special Defense by one stage each."}, {"name": "いやしのはどう", "type": "エスパー", "category": "へんか", "power": "", "pp": "10", "desc": "いやしのはどうをとばして最大ＨＰの半分相手のＨＰを回復する。", "effect": "Heals the target for half its max HP."}, {"name": "たたりめ", "type": "ゴースト", "category": "とくしゅ", "power": "65", "pp": "10", "desc": "たたみかけるように攻撃する。状態異常の相手に大きなダメージを与える。", "effect": "Inflicts regular damage.  If the target has a major status ailment, this move has double power."}, {"name": "フリーフォール", "type": "ひこう", "category": "ぶつり", "power": "60", "pp": "10", "desc": "１ターン目で相手を空へ連れさり２ターン目に落として攻撃する。連れさられた相手は動けない。", "effect": "Inflicts regular damage.  User carries the target high into the air for one turn, during which no moves will hit either Pokémon and neither can act.  On the following turn, the user drops the target, inflicting damage and ending the effect.\n\nIf the target is flying-type, this move will function as normal but inflict no damage.\n\ngust, hurricane, sky uppercut, smack down, thunder, twister, and whirlwind can hit both the user and the target during this effect.  gust and twister will additionally have double power.\n\nThe damage from hail and sandstorm still applies during this effect.\n\nEither Pokémon may be hit during this effect if also under the effect of lock on, mind reader, or no guard.\n\nThis move cannot be used while gravity is in effect.\n\nThis move cannot be selected by sleep talk.\n\n*Bug*: If gravity is used during a double or triple battle while this move is in effect, this move is not correctly canceled on the target, and it remains high in the air indefinitely.  As this move prevents the target from acting, the only way to subsequently remove it from the field is to faint it."}, {"name": "ギアチェンジ", "type": "はがね", "category": "へんか", "power": "", "pp": "10", "desc": "歯車を回して自分の攻撃をあげるだけでなく素早さもぐーんとあげる。", "effect": "Raises the user's Attack by one stage and its Speed by two stages pes.\n\nFor all other purposes, this move is pure Fighting-type.  If this move's type is changed, its Fighting typing is overwritten, and its secondary type remains Flying.\n\nIf the target has used minimize since entering battle, this move has double power and will never miss."}, {"name": "たたみがえし", "type": "かくとう", "category": "へんか", "power": "", "pp": "10", "desc": "かえしたタタミを盾にして自分や味方への技のダメージを防ぐ。変化技は防ぐことができない。", "effect": "Protects all friendly Pokémon from damaging moves.  Only works on the first turn after the user is sent out."}, {"name": "ゲップ", "type": "どく", "category": "とくしゅ", "power": "120", "pp": "10", "desc": "相手に向かってゲップを浴びせてダメージを与える。きのみを食べないとだせない。", "effect": "Inflicts regular damage.  Can only be used if the user has eaten a berry since the beginning of the battle.\n\nAfter the user eats a berry, it may use this move any number of times until the end of the battle, even if it switches out.  Eating a held berry, eating a berry via bug bite or pluck, or being the target of a Flung berry will enable this move.  Feeding a Pokémon a berry from the bag or using natural gift will not.\n\nIf the trainer chooses this move when it cannot be used, the choice is rejected outright and the trainer must choose another move."}, {"name": "たがやす", "type": "じめん", "category": "へんか", "power": "", "pp": "10", "desc": "地面を耕して草木が育ちやすいようにする。くさタイプの攻撃と特攻があがる。", "effect": "Raises the Attack and Special Attack of all grass Pokémon in battle."}, {"name": "ねばねばネット", "type": "むし", "category": "へんか", "power": "", "pp": "20", "desc": "相手の周りにねばねばしたネットをはりめぐらせ交代ででてきた相手の素早さをさげる。", "effect": "Shoots a web over the opponents' side of the field, which lowers the Speed of any opposing Pokémon that enters the field by one stage.\n\nPokémon in the air, such as flying-types and those with levitate, are unaffected.  rapid spin removes Sticky Web from the user's side of the field; defog removes it from both sides."}, {"name": "とどめばり", "type": "むし", "category": "ぶつり", "power": "50", "pp": "25", "desc": " mage.  If the user was not yet hit by an opponent's physical move this turn, this move will fail."}, {"name": "フルールカノン", "type": "フェアリー", "category": "とくしゅ", "power": "130", "pp": "5", "desc": "強力なビームを放ったあと自分の特攻ががくっとさがる。", "effect": "Inflicts regular damage, then lowers the user's Special Attack by two stages."}, {"name": "サイコファング", "type": "エスパー", "category": "ぶつり", "power": "85", "pp": "10", "desc": "サイコパワーでかみついて相手を攻撃する。ひかりのかべやリフレクターなども破壊できる。", "effect": "Destroys any light screen or reflect on the target's side of the field, then inflicts regular damage."}, {"name": "じだんだ", "type": "じめん", "category": "ぶつり", "power": "75", "pp": "10", "desc": "悔しさをバネにして攻撃する。前のターンに技を外していると威力が倍になる。", "effect": "Inflicts regular damage.  Power is doubled if the user's last move failed for any reason (i.e., produced the message \"But it failed!\") or was ineffective due to types."}, {"name": "シャドーボーン", "type": "ゴースト", "category": "ぶつり", "power": "85", "pp": "10", "desc": "魂の宿ったホネで相手をなぐりつけて攻撃する。相手の防御をさげることがある。", "effect": "Inflicts regular damage.  Has a 20% chance to lower the target's Defense by one stage."}, {"name": "アクセルロック", "type": "いわ", "category": "ぶつり", "power": "40", "pp": "20", "desc": "素早いスピードで相手にぶつかって攻撃する。必ず先制攻撃できる。", "effect": "Inflicts regular damage."}, {"name": "アクアブレイク", "type": "みず", "category": "ぶつり", "power": "85", "pp": "10", "desc": "水の力で相手にぶつかって攻撃する。相手の防御をさげることがある。", "effect": "Inflicts regular damage.  Has a 20% chance to lower the target's Defense by one stage."}, {"name": "プリズムレーザー", "type": "エスパー", "category": "とくしゅ", "power": "160", "pp": "10", "desc": "プリズムの力で強力な光線を発射する。次のターンは動けなくなる。", "effect": "Inflicts regular damage.  User loses its next turn to \"recharge\", and cannot attack or switch out during that turn."}, {"name": "シャドースチール", "type": "ゴースト", "category": "ぶつり", "power": "90", "pp": "10", "desc": "相手の影に潜り込み相手の能力アップを奪って攻撃する。", "effect": "Steals the target's stat increases, then inflicts regular damage.  Will not steal stat increases that would put , "pp": "5", "desc": "自分の頭を爆発させて周りのすべてを攻撃する。自分もダメージを受けてしまう。", "effect": "Inflicts damage, and the user takes damage equal to half of its max HP, rounded up. The user still takes damage if the move is blocked by Protect or Substitute, misses, or if the target has Flash Fire."}, {"name": "プラズマフィスト", "type": "でんき", "category": "ぶつり", "power": "100", "pp": "15", "desc": "電気をまとったこぶしで攻撃。ノーマルタイプの技をでんきタイプにしてしまう。", "effect": "After inflicting damage, all Normal-type moves become Electric-type for the remainder of the turn, including status moves. This effect is applied after move type-changing abilities, such as Pixilate and Normalize."}, {"name": "フォトンゲイザー", "type": "エスパー", "category": "とくしゅ", "power": "100", "pp": "5", "desc": "光の柱で攻撃する。攻撃と特攻を比べて高いほうでダメージを与える。", "effect": "Inflicts regular damage."}, {"name": "てんこがすめつぼうのひかり", "type": "エスパー", "category": "とくしゅ", "power": "200", "pp": "1", "desc": "ネクロズマが相手の特性の効果を無視して攻撃と特攻の高いほうでダメージを与える。", "effect": "Inflicts damage using either Attack or Special Attack stat, whichever is higher. Determining which stat is used takes into account stat changes but not held items or abilities."}, {"name": "サンシャインスマッシャー", "type": "はがね", "category": "ぶつり", "power": "200", "pp": "1", "desc": "Ｚパワーを得たソルガレオが全力で攻撃する。相手の特性の効果を無視できる。", "effect": "Inflicts regular damage.  Other Pokémon's abilities cannot activate in response to this move.  In particular, it hits through disguise"}, {"name": "ムーンライトブラスター", "type": "ゴースト", "category": "とくしゅ", "power": "200", "pp": "1", "desc": "Ｚパワーを得たルナアーラが全力で攻撃する。相手の特性の効果を無視できる。", "effect": "Inflicts regular damage.  Other Pokémon's abilities cannot activate in response to this move.  In particular, it hits through disguise"}, {"name": "ぽかぼかフレンドタイム", "type": "フェアリー", "category": "ぶつり", "power": "190", "pp": "1", "desc": "Ｚパワーを得たミミッキュが全力でぽかぽか攻撃。", "effect": "Inflicts regular damage."}, {"name": "ラジアルエッジストーム", "type": "いわ", "category": "ぶつり", "power": "190", "pp": "1", "desc": "Ｚパワーを得たルガルガンが全力で攻撃する。追加でフィールド状態を打ち消す。", "ef let parties = JSON.parse(localStorage.getItem('pkm_parties') || '[]');
let records = JSON.parse(localStorage.getItem('pkm_records') || '[]');
let selectedPartyId = null;
let recordResult = null;
let editingPartyId = null;
const mySelFilter = [];
const oppSelFilter = [];
// 最近選んだポケモン（最大20件、先頭が最新）
let recentPicks = JSON.parse(localStorage.getItem('pkm_recent_picks') || '[]');
function recordRecentPick(displayName) {
  recentPicks = recentPicks.filter(n => n !== displayName);
  recentPicks.unshift(displayName);
  if (recentPicks.length > 20) recentPicks = recentPicks.slice(0, 20);
  localStorage.setItem('pkm_recent_picks', JSON.stringify(recentPicks));
}
function sortByRecent(arr) {
  return [...arr].sort((a, b) => {
    const ai = recentPicks.indexOf(a.display);
    const bi = recentPicks.indexOf(b.display);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
}
let currentUser = null;
let _fbReady = false;

// Firestore保存（ログイン中のみ、localStorageにも同時保存）
async function saveData() {
  localStorage.setItem('pkm_parties', JSON.stringify(parties));
  localStorage.setItem('pkm_records', JSON.stringify(records));
  if (!currentUser || !_fbReady) return;
  const { doc, setDoc } = window._firestoreOps;
  const db = window._db;
  const uid = currentUser.uid;
  try {
    await setDoc(doc(db, 'users', uid, 'data', 'main'), {
      parties, records, updatedAt: window._firestoreOps.serverTimestamp()
    });
  } catch(e) { console.error('Firestore save error:', e); }
}

// Firestoreからロード
async function loadFromFirestore() {
  if (!currentUser || !_fbReady) return;
  const { doc, getDoc } = window._firestoreOps;
  const db = window._db;
  const uid = currentUser.uid;
  try {
    const snap = await getDoc(doc(db, 'users', uid, 'data', 'main'));
    if (snap.exists()) {
      const data = snap.data();
      parties = data.parties || [];
      records = data.records || [];
      localStorage.setItem('pkm_parties', JSON.stringify(parties));
      localStorage.setItem('pkm_records', JSON.stringify(records));
    }
    await dmLoadMasterData();
  } catch(e) { console.error('Firestore load error:', e); }
}

// 認証トグル
async function toggleAuth() {
  if (currentUser) {
    await window._signOut(window._auth);
  } else {
    const provider = new window._GoogleAuthProvider();
    try {
      await window._signInWithPopup(window._auth, provider);
    } catch(e) { console.error('Auth error:', e); }
  }
}

// Firebase初期化待ちでAuth監視を開始
function initFirebase() {
  _fbReady = true;
  window._onAuthStateChanged(window._auth, async (user) => {
    currentUser = user;
    const nameEl = document.getElementById('user-name');
    const btnEl = document.getElementById('auth-btn');
    const banner = document.getElementById('login-banner');
    if (user) {
      nameEl.textContent = user.displayName || user.email;
      btnEl.textContent = 'ログアウト';
      banner.style.display = 'none';
      await loadFromFirestore();
      renderParties();
      renderHistory();
    } else {
      nameEl.textContent = '';
      btnEl.textContent = 'ログイン';
      banner.style.display = 'block';
    }
  });
}

// Firebase準備完了イベント待ち
if (window._firebaseReady) {
  initFirebase();
} else {
  document.addEventListener('firebase-ready', initFirebase);
}

// ---- NAVIGATION ----
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'parties') renderParties();
  if (name === 'record') renderRecordPage();
  if (name === 'history') renderHistory();
  if (name === 'datamanage') { dmType=null; dmAction=null;
    ['dm-tab-pokemon','dm-tab-move','dm-btn-search','dm-btn-add'].forEach(id => { const el=document.getElementById(id); if(el) el.className='btn btn-ghost'; });
    document.getElementById('dm-action-area').style.display='none';
    document.getElementById('dm-form-card').style.display='none';
    document.getElementById('dm-search-area').style.display='none'; }
}

// カタカナ↔ひらがな変換
function toHiragana(str) {
  return str.replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}
function toKatakana(str) {
  return str.replace(/[ぁ-ゖ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
}

function onSlotInput(input) {
  const val = input.value.trim();
  const listId = `ac-${input.dataset.container}-${input.dataset.index}`;
  const list = document.getElementById(listId);
  if (!val || val.length < 1) { list.classList.remove('open'); return; }
  const valKana = toKatakana(val);
  const valHira = toHiragana(val);
  // 選出スロットはパーティから絞り込む
  let pokemonSource;
  if (input.dataset.container === 'opp-selection-slots' && window._oppPartyOptions && window._oppPartyOptions.length) {
    pokemonSource = window._oppPartyOptions.map(name => ({ display: name, confirmed: true, no: '', type1: '', type2: '' }));
  } else if (input.dataset.container === 'my-selection-slots' && window._myPartyOptions && window._myPartyOptions.length) {
    pokemonSource = window._myPartyOptions.map(name => ({ display: name, confirmed: true, no: '', type1: '', type2: '' }));
  } else {
    pokemonSource = (localPokemon || POKEMON_LIST).filter(p => p.confirmed);
  }
  // 相手パーティスロットではメガシンカを除外
  const acExcludeMega = input.dataset.container === 'opp-party-slots';

  const allMatches = pokemonSource.filter(p => {
    if (acExcludeMega && isMegaForm(p)) return false;
    const d = p.display;
    const dH = toHiragana(d);
    return d.includes(valKana) || dH.includes(valHira);
  });
  // 頭文字一致を先に、途中一致を後に並べる
  const startsWith = allMatches.filter(p => {
    const dH = toHiragana(p.display);
    return dH.startsWith(valHira) || p.display.startsWith(valKana);
  });
  const others = allMatches.filter(p => {
    const dH = toHiragana(p.display);
    return !dH.startsWith(valHira) && !p.display.startsWith(valKana);
  });
  // 各グループ内で最近選んだものを先頭に
  const matches = [...sortByRecent(startsWith), ...sortByRecent(others)].slice(0, 20);
  if (!matches.length) { list.classList.remove('open'); return; }
  list.innerHTML = matches.map(p =>
    `<div class="autocomplete-item" data-display="${p.display}">${p.display}</div>`
  ).join('');
  // mousedownでクリック選択（inputのblur前に発火する）
  list.querySelectorAll('.autocomplete-item').forEach(item => {
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      input.value = item.dataset.display;
      recordRecentPick(item.dataset.display);
      updateSlotIcon(input, item.dataset.display);
      list.classList.remove('open');
      // 相手パーティスロットで選択したら選出プルダウンを更新
      if (input.dataset.container === 'opp-party-slots') rebuildOppSelectionDropdowns();
    });
  });
  list.classList.add('open');
}

function onSlotKeydown(e, input) {
  const listId = `ac-${input.dataset.container}-${input.dataset.index}`;
  const list = document.getElementById(listId);
  const items = list.querySelectorAll('.autocomplete-item');
  const current = list.querySelector('.selected');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!current) items[0]?.classList.add('selected');
    else { current.classList.remove('selected'); (current.nextElementSibling || items[0])?.classList.add('selected'); }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (current) { current.classList.remove('selected'); (current.previousElementSibling || items[items.length-1])?.classList.add('selected'); }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const sel = list.querySelector('.selected') || items[0];
    if (sel) { input.value = sel.dataset.display; list.classList.remove('open');
      recordRecentPick(sel.dataset.display);
      updateSlotIcon(input, sel.dataset.display);
      if (input.dataset.container === 'opp-party-slots') rebuildOppSelectionDropdowns(); }
  } else if (e.key === 'Escape') {
    list.classList.remove('open');
  }
}

function selectPokemon(el, listId) {
  const list = document.getElementById(listId);
  const input = list.closest('.slot-input-wrap').querySelector('input[type=text]');
  if (input) input.value = el.dataset.display;
  list.classList.remove('open');
}

function clearSlot(btn) {
  const input = btn.closest('.slot-input-wrap').querySelector('input[type=text]');
  input.value = '';
  updateSlotIcon(input, '');
  if (input.dataset.container === 'opp-party-slots') rebuildOppSelectionDropdowns();
}

// フォーカス時に予測変換を即座に表示（空でも最近選んだ順で表示）
function onSlotFocus(input) {
  const listId = `ac-${input.dataset.container}-${input.dataset.index}`;
  const list = document.getElementById(listId);
  if (!list) return;
  if (input.value.trim()) {
    // 文字が入っている場合は通常のフィルタ
    onSlotInput(input);
    return;
  }
  // 空の場合: パーティ候補 or 最近選んだ順で最大10件表示
  let candidates;
  const cid = input.dataset.container;
  if (cid === 'opp-selection-slots' && window._oppPartyOptions && window._oppPartyOptions.length) {
    candidates = window._oppPartyOptions.map(n => ({ display: n, no: '', type1: '', type2: '' }));
  } else if (cid === 'my-selection-slots' && window._myPartyOptions && window._myPartyOptions.length) {
    candidates = window._myPartyOptions.map(n => ({ display: n, no: '', type1: '', type2: '' }));
  } else {
    const focusExcludeMega = cid === 'opp-party-slots';
    const src = (localPokemon || POKEMON_LIST).filter(p => {
      if (!p.confirmed) return false;
      if (focusExcludeMega && isMegaForm(p)) return false;
      return true;
    });
    candidates = sortByRecent(src).slice(0, 10);
  }
  if (!candidates.length) return;
  list.innerHTML = candidates.map(p =>
    `<div class="autocomplete-item" data-display="${p.display}">${p.display}</div>`
  ).join('');
  list.querySelectorAll('.autocomplete-item').forEach(item => {
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      input.value = item.dataset.display;
      recordRecentPick(item.dataset.display);
      updateSlotIcon(input, item.dataset.display);
      list.classList.remove('open');
    });
  });
  list.classList.add('open');
}

// 選出用プルダウン生成（自分/相手のパーティ6体のみ）
function createSelectionDropdown(containerId, index, label, options) {
  const wrap = document.createElement('div');
  wrap.className = 'pokemon-slot';
  const opts = options.filter(Boolean).map(p => `<option value="${p}">${p}</option>`).join('');
  wrap.innerHTML = `
    <div class="slot-label">${label}</div>
    <select data-container="${containerId}" data-index="${index}">
      <option value="">-- 選択 --</option>
      ${opts}
    </select>
  `;
  return wrap;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.pokemon-slot')) {
    document.querySelectorAll('.autocomplete-list').forEach(l => l.classList.remove('open'));
  }
});

function getSlotValues(containerId, count) {
  const container = document.getElementById(containerId);
  // input[type=text] と select 両方に対応
  const inputs = Array.from(container.querySelectorAll('input[type=text], select'));
  return inputs.slice(0, count).map(i => i.value.trim());
}

function setSlotValues(containerId, values) {
  const container = document.getElementById(containerId);
  const inputs = container.querySelectorAll('input[type=text]');
  values.forEach((v, i) => {
    if (inputs[i]) {
      inputs[i].value = v;
      updateSlotIcon(inputs[i], v);
    }
  });
}

// ---- FILTER SELECTS ----
// 自分の選出フィルター: パーティ選択に連動して選択肢を更新
function updateMySelFilterSelect() {
  const sel = document.getElementById('my-sel-filter-select');
  const hint = document.getElementById('my-sel-filter-hint');
  const filterVal = document.getElementById('history-filter').value;
  const party = filterVal ? parties.find(p => p.id === filterVal) : null;
  const options = party ? party.pokemon.filter(Boolean) : [];
  if (!options.length) {
    sel.disabled = true;
    sel.innerHTML = '<option value="">-- 選択 --</option>';
    if (hint) hint.textContent = '（パーティを先に選択してください）';
    return;
  }
  sel.disabled = false;
  if (hint) hint.textContent = '';
  sel.innerHTML = '<option value="">-- 選択 --</option>' +
    options.map(p => `<option value="${p}">${p}</option>`).join('');
}

// 相手の選出フィルター: 全試合の相手選出から重複除去して選択肢を生成
function updateOppSelFilterSelect() {
  const sel = document.getElementById('opp-sel-filter-select');
  const all = [...new Set(records.flatMap(r => r.oppSelection.filter(Boolean)))].sort();
  sel.innerHTML = '<option value="">-- 選択 --</option>' +
    all.map(p => `<option value="${p}">${p}</option>`).join('');
}

function addFilterTagFromSelect(selectEl, filterKey) {
  const name = selectEl.value;
  if (!name) return;
  selectEl.value = ''; // 選択後リセット
  addFilterTag(name, filterKey);
}

function addFilterTag(name, filterKey) {
  const arr = filterKey === 'mySelFilter' ? mySelFilter : oppSelFilter;
  if (arr.includes(name)) return;
  arr.push(name);
  renderFilterTags(filterKey);
  renderHistory();
}

function removeFilterTag(name, filterKey) {
  const arr = filterKey === 'mySelFilter' ? mySelFilter : oppSelFilter;
  const idx = arr.indexOf(name);
  if (idx >= 0) arr.splice(idx, 1);
  renderFilterTags(filterKey);
  renderHistory();
}

function renderFilterTags(filterKey) {
  const arr = filterKey === 'mySelFilter' ? mySelFilter : oppSelFilter;
  const containerId = filterKey === 'mySelFilter' ? 'my-sel-filter-tags' : 'opp-sel-filter-tags';
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = arr.map(name =>
    `<span class="filter-tag">${name}<button onclick="removeFilterTag('${name}','${filterKey}')" title="削除">×</button></span>`
  ).join('');
}

// ---- PARTIES ----
function renderParties() {
  const grid = document.getElementById('party-grid');
  if (!parties.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🎮</div><p>パーティがまだありません</p><p>右上のボタンから登録してください</p></div>';
    return;
  }
  const cards = parties.map((p, i) => {
    const div = document.createElement('div');
    div.className = 'party-card';
    div.dataset.partyId = p.id;
    div.innerHTML =
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">' +
        '<div style="display:flex;flex-direction:column;gap:2px">' +
          '<button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:11px;line-height:1" data-action="up">▲</button>' +
          '<button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:11px;line-height:1" data-action="down">▼</button>' +
        '</div>' +
        '<div class="party-name" style="flex:1;cursor:pointer" data-action="edit">' + p.name + '</div>' +
        '<button class="btn btn-ghost btn-sm" data-action="delete">削除</button>' +
      '</div>' +
      '<div style="cursor:pointer" data-action="edit">' +
        p.pokemon.filter(Boolean).map(pk => getPokeSpriteHTMLByDisplay(pk)).join('') +
      '</div>';
    // ▲▼の disabled
    div.querySelector('[data-action="up"]').disabled = (i === 0);
    div.querySelector('[data-action="down"]').disabled = (i === parties.length - 1);
    // イベント登録
    div.querySelector('[data-action="up"]').addEventListener('click', e => { e.stopPropagation(); moveParty(p.id, -1); });
    div.querySelector('[data-action="down"]').addEventListener('click', e => { e.stopPropagation(); moveParty(p.id, 1); });
    div.querySelector('[data-action="delete"]').addEventListener('click', e => { e.stopPropagation(); deleteParty(p.id); });
    div.querySelectorAll('[data-action="edit"]').forEach(el => el.addEventListener('click', () => editParty(p.id)));
    return div;
  });
  grid.innerHTML = '';
  cards.forEach(c => grid.appendChild(c));
}


function moveParty(id, dir) {
  const idx = parties.findIndex(p => p.id === id);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= parties.length) return;
  const [moved] = parties.splice(idx, 1);
  parties.splice(newIdx, 0, moved);
  saveData();
  renderParties();
  renderRecordPage();
}


function openPartyModal(id) {
  editingPartyId = id || null;
  const modal = document.getElementById('party-modal');
  document.getElementById('party-modal-title').textContent = id ? 'パーティを編集' : 'パーティを登録';
  const slotsEl = document.getElementById('party-modal-slots');
  slotsEl.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    slotsEl.appendChild(createPokemonSlot('party-modal-slots', i, `${i+1}体目`));
  }
  document.getElementById('party-name-input').value = '';
  if (id) {
    const p = parties.find(x => x.id === id);
    if (p) {
      document.getElementById('party-name-input').value = p.name;
      setSlotValues('party-modal-slots', p.pokemon);
    }
  }
  modal.classList.add('open');
}

function closePartyModal() {
  document.getElementById('party-modal').classList.remove('open');
}

function saveParty() {
  const name = document.getElementById('party-name-input').value.trim();
  if (!name) { alert('パーティ名を入力してください'); return; }
  const pokemon = getSlotValues('party-modal-slots', 6);
  if (!pokemon.some(Boolean)) { alert('少なくとも1体は入力してください'); return; }
  // ② 同名チェック（編集中のパーティ自身は除く）
  const dup = parties.find(p => p.name === name && p.id !== editingPartyId);
  if (dup) { alert(`「${name}」という名前のパーティはすでに存在します`); return; }
  if (editingPartyId) {
    const idx = parties.findIndex(p => p.id === editingPartyId);
    if (idx >= 0) { parties[idx].name = name; parties[idx].pokemon = pokemon; }
  } else {
    if (parties.length >= 50) { alert('パーティは最大50個まで登録できます'); return; }
    // ③ 新規は先頭に追加
    parties.unshift({ id: Date.now().toString(), name, pokemon });
  }
  saveData();
  closePartyModal();
  renderParties();
  renderRecordPage();
}

function editParty(id) {
  openPartyModal(id);
}

function deleteParty(id) {
  if (!confirm('このパーティを削除しますか？')) return;
  parties = parties.filter(p => p.id !== id);
  saveData();
  renderParties();
}

// ---- RECORD PAGE ----
function renderRecordPage() {
  const sel = document.getElementById('party-select-dropdown');
  if (!sel) return;
  sel.innerHTML = '<option value="">-- パーティを選択 --</option>';
  parties.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name;
    if (p.id === selectedPartyId) opt.selected = true;
    sel.appendChild(opt);
  });
  if (!parties.length) {
    document.getElementById('record-form-card').style.display = 'none';
    return;
  }
  if (selectedPartyId) showRecordForm();
}

function onPartyDropdownChange(id) {
  if (!id) {
    selectedPartyId = null;
    document.getElementById('record-form-card').style.display = 'none';
    return;
  }
  selectPartyForRecord(id);
}

function selectPartyForRecord(id) {
  selectedPartyId = id;
  recordResult = null;
  document.getElementById('btn-win').classList.remove('active');
  document.getElementById('btn-lose').classList.remove('active');
  renderRecordPage();
  showRecordForm();
}

function showRecordForm() {
  const form = document.getElementById('record-form-card');
  form.style.display = 'block';

  // Set datetime
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
  document.getElementById('rec-date').value = local.toISOString().slice(0, 16);

  // 自分のパーティ
  const myParty = parties.find(p => p.id === selectedPartyId);
  const myPokemon = myParty ? myParty.pokemon : [];

  // 相手パーティスロット（フリー入力）
  const oppParty = document.getElementById('opp-party-slots');
  oppParty.innerHTML = '';
  for (let i = 0; i < 6; i++) oppParty.appendChild(createPokemonSlot('opp-party-slots', i, `${i+1}体目`));

  // 相手パーティ: 直接テキスト入力してフォーカスを外した場合に対応
  oppParty.querySelectorAll('input[type=text]').forEach(input => {
    input.addEventListener('blur', () => {
      rebuildOppSelectionDropdowns();
    });
  });

  // 自分のパーティアイコンを表示
  const myIcons = document.getElementById('my-party-icons');
  if (myIcons) {
    myIcons.innerHTML = myPokemon.filter(Boolean).map(name => getPokeSpriteHTMLByDisplay(name)).join('');
  }

  // 自分の選出プルダウン（自パーティ6体）
  buildMySelectionDropdowns(myPokemon);

  // 相手の選出プルダウン（初期は空）
  buildOppSelectionDropdowns([]);

  document.getElementById('rec-memo').value = '';
  form.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildMySelectionDropdowns(options) {
  const mySelection = document.getElementById('my-selection-slots');
  mySelection.innerHTML = '';
  for (let i = 0; i < 4; i++) mySelection.appendChild(createSelectionDropdown('my-selection-slots', i, `${i+1}体目`, options));
}

function buildOppSelectionDropdowns(options) {
  const oppSelection = document.getElementById('opp-selection-slots');
  oppSelection.innerHTML = '';
  for (let i = 0; i < 4; i++) oppSelection.appendChild(createSelectionDropdown('opp-selection-slots', i, `${i+1}体目`, options));
}

function rebuildOppSelectionDropdowns() {
  const oppPokemon = getSlotValues('opp-party-slots', 6).filter(Boolean);
  buildOppSelectionDropdowns(oppPokemon);
}

function setResult(r) {
  recordResult = r;
  document.getElementById('btn-win').classList.toggle('active', r === 'win');
  document.getElementById('btn-lose').classList.toggle('active', r === 'lose');
}

function saveRecord() {
  if (!selectedPartyId) { alert('パーティを選択してください'); return; }
  if (!recordResult) { alert('勝敗を選択してください'); return; }
  const oppParty = getSlotValues('opp-party-slots', 6);
  if (!oppParty.some(Boolean)) { alert('相手のパーティを1体以上入力してください'); return; }

  const rec = {
    id: Date.now().toString(),
    partyId: selectedPartyId,
    date: document.getElementById('rec-date').value,
    oppParty,
    mySelection: getSlotValues('my-selection-slots', 4),
    oppSelection: getSlotValues('opp-selection-slots', 4),
    result: recordResult,
    memo: document.getElementById('rec-memo').value.trim()
  };
  records.unshift(rec);
  saveData();
  alert('記録を保存しました！');
  selectedPartyId = null;
  recordResult = null;
  document.getElementById('record-form-card').style.display = 'none';
  renderRecordPage();
}

// ---- HISTORY ----
function renderHistory() {
  // Update filter options
  const filter = document.getElementById('history-filter');
  const current = filter.value;
  filter.innerHTML = '<option value="">すべてのパーティ</option>';
  parties.forEach(p => {
    filter.innerHTML += `<option value="${p.id}" ${current === p.id ? 'selected' : ''}>${p.name}</option>`;
  });
  // プルダウンを最新状態に更新
  updateMySelFilterSelect();
  updateOppSelFilterSelect();

  const filterVal = filter.value;
  const resultFilterVal = document.getElementById('history-result-filter').value;
  let filtered = filterVal ? records.filter(r => r.partyId === filterVal) : records;
  if (resultFilterVal) filtered = filtered.filter(r => r.result === resultFilterVal);
  // 自分の選出ポケモン絞り込み（AND条件）
  if (mySelFilter.length) {
    filtered = filtered.filter(r =>
      mySelFilter.every(name => r.mySelection.includes(name))
    );
  }
  // 相手の選出ポケモン絞り込み（AND条件）
  if (oppSelFilter.length) {
    filtered = filtered.filter(r =>
      oppSelFilter.every(name => r.oppSelection.includes(name))
    );
  }

  // Stats
  const stats = document.getElementById('history-stats');
  if (filtered.length) {
    stats.style.display = 'block';
    const wins = filtered.filter(r => r.result === 'win').length;
    const loses = filtered.filter(r => r.result === 'lose').length;
    document.getElementById('stat-total').textContent = filtered.length;
    document.getElementById('stat-win').textContent = wins;
    document.getElementById('stat-lose').textContent = loses;
    document.getElementById('stat-rate').textContent = Math.round(wins / filtered.length * 100) + '%';
  } else stats.style.display = 'none';

  const list = document.getElementById('history-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>記録がありません</p></div>';
    return;
  }

  list.innerHTML = filtered.map(r => {
    const party = parties.find(p => p.id === r.partyId);
    const dateStr = r.date ? new Date(r.date).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    const mySelList = r.mySelection.filter(Boolean);
    const oppPartyList = r.oppParty.filter(Boolean);
    const oppSelList = r.oppSelection.filter(Boolean);
    const isWin = r.result === 'win';

    const tagRow = (arr, color, filterArr) => arr.length
      ? arr.map(p => {
          const isHighlight = filterArr && filterArr.includes(p);
          const sprite = getPokeSpriteHTMLByDisplay(p);
          return `<div style="display:inline-flex;flex-direction:column;align-items:center;${isHighlight?'outline:2px solid var(--accent);border-radius:4px;':''}vertical-align:top">${sprite}</div>`;
        }).join('')
      : '<span style="font-size:11px;color:var(--text-muted)">なし</span>';

    return `<div class="record-item" onclick="openDetail('${r.id}')" style="border-left:3px solid ${isWin ? 'var(--win)' : 'var(--lose)'}">
      <div class="record-header" style="margin-bottom:10px">
        <span class="${isWin ? 'badge-win' : 'badge-lose'}">${isWin ? '🏆 勝ち' : '💀 負け'}</span>
        <span style="font-weight:600">${party ? party.name : '(削除済み)'}</span>
        <span class="record-date" style="margin-left:auto">${dateStr}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
        <div>
          <div style="color:var(--text-muted);margin-bottom:4px">自分の選出</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px">${tagRow(mySelList, 'rgba(108,99,255,0.25)', mySelFilter)}</div>
        </div>
        <div>
          <div style="color:var(--text-muted);margin-bottom:4px">相手の選出</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px">${tagRow(oppSelList, 'rgba(255,101,132,0.2)', oppSelFilter)}</div>
        </div>
        <div style="grid-column:1/-1">
          <div style="color:var(--text-muted);margin-bottom:4px">相手のパーティ</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px">${tagRow(oppPartyList, 'rgba(255,255,255,0.06)')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ---- DETAIL MODAL ----

      <h4>自分のパーティ</h4>
      <div class="detail-pokemon">

    </div>
    <div class="detail-section">
      <h4>相手のパーティ（6体）</h4>

      <h4>自分の選出（4体）</h4>
      <div class="detail-pokemon">
        ${r.mySelection.filter(Boolean).map(p => getPokeSpriteHTMLByDisplay(p)).join('') || '<span class="text-muted">記録なし</span>'}
      </div>
    </div>
    <div class="detail-section">
      <h4>相手の選出（4体）</h4>

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

function deleteRecord(id) {
  if (!confirm('この記録を削除しますか？')) return;
  records = records.filter(r => r.id !== id);
  saveData();
  closeDetailModal();
  renderHistory();
}

let dmType = null;
let dmAction = null;
let dmEditIndex = null;
let localPokemon = JSON.parse(JSON.stringify(POKEMON_LIST));
let localMoves   = JSON.parse(JSON.stringify(MOVES_LIST));
// 古いlocalStorageキーをクリア（pkm_master_pokemonは旧方式）
localStorage.removeItem('pkm_master_pokemon');

function dmSelectType(type) {

  document.getElementById('dm-tab-pokemon').className = 'btn ' + (type==='pokemon' ? 'btn-primary' : 'btn-ghost');
  document.getElementById('dm-tab-move').className    = 'btn ' + (type==='move'    ? 'btn-primary' : 'btn-ghost');

  document.getElementById('dm-search-area').style.display = 'none';

function dmSelectAction(action) {
  dmAction = action;
  const btnList = document.getElementById('dm-btn-list');
  if (btnList) btnList.className = 'btn ' + (action==='list' ? 'btn-primary' : 'btn-ghost');

  document.getElementById('dm-list-card').style.display = action === 'list' ? 'block' : 'none';
  if (action === 'list') {
    if (dmType === 'pokemon') renderDmList();

  }
  if (action === 'search') {
    document.getElementById('dm-search-area').style.display = 'block';
    document.getElementById('dm-search-label').textContent  = dmType==='pokemon' ? 'ポケモン名で検索' : '技名で検索';
    document.getElementById('dm-search-input').placeholder  = dmType==='pokemon' ? 'ポケモン名を入力...' : '技名を入力...';
    document.getElementById('dm-form-card').style.display   = 'none';
  } else {
    document.getElementById('dm-search-area').style.display = 'none';
    dmShowForm(null);
  }
}

function dmOnSearchInput(input) {
  const val = input.value.trim();
  const list = document.getElementById('dm-search-list');
  if (!val) { list.classList.remove('open'); return; }
  const valKana = toKatakana(val);
  const valHira = toHiragana(val);
  let entries;
  if (dmType === 'pokemon') {
    const all = localPokemon.filter(p => {
      const dH = toHiragana(p.display);
      return p.display.includes(valKana) || dH.includes(valHira);
    }); // データ管理は内定フィルタなし・全件検索
    const sw = all.filter(p => toHiragana(p.display).startsWith(valHira) || p.display.startsWith(valKana));
    const ot = all.filter(p => !toHiragana(p.display).startsWith(valHira) && !p.display.startsWith(valKana));
    entries = [...sw, ...ot].slice(0,20).map(p => ({ label: p.display, idx: localPokemon.indexOf(p) }));
  } else {
    const all = localMoves.filter(m => {
      const dH = toHiragana(m.name);
      return m.name.includes(valKana) || dH.includes(valHira);
    });
    const sw = all.filter(m => toHiragana(m.name).startsWith(valHira) || m.name.startsWith(valKana));
    const ot = all.filter(m => !toHiragana(m.name).startsWith(valHira) && !m.name.startsWith(valKana));
    entries = [...sw, ...ot].slice(0,20).map(m => ({ label: m.name, idx: localMoves.indexOf(m) }));
  }
  if (!entries.length) { list.classList.remove('open'); return; }
  list.innerHTML = entries.map(e => `<div class="autocomplete-item" data-idx="${e.idx}">${e.label}</div>`).join('');
  list.querySelectorAll('.autocomplete-item').forEach(item => {
    item.addEventListener('mousedown', ev => {
      ev.preventDefault();
      input.value = item.textContent;
      list.classList.remove('open');
      dmShowForm(parseInt(item.dataset.idx));
    });
  });
  list.classList.add('open');
}

function dmOnSearchKeydown(e, input) {
  const list = document.getElementById('dm-search-list');
  const items = list.querySelectorAll('.autocomplete-item');
  const cur = list.querySelector('.selected');
  if (e.key==='ArrowDown') { e.preventDefault(); if(!cur) items[0]?.classList.add('selected'); else { cur.classList.remove('selected'); (cur.nextElementSibling||items[0])?.classList.add('selected'); } }
  else if (e.key==='ArrowUp') { e.preventDefault(); if(cur) { cur.classList.remove('selected'); (cur.previousElementSibling||items[items.length-1])?.classList.add('selected'); } }
  else if (e.key==='Enter') { e.preventDefault(); const sel=list.querySelector('.selected')||items[0]; if(sel){ input.value=sel.textContent; list.classList.remove('open'); dmShowForm(parseInt(sel.dataset.idx)); } }
  else if (e.key==='Escape') { list.classList.remove('open'); }
}

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px">

        <div><label>防御</label><input  type="text" id="dmf-def"   value="${v('def')}"></div>
        <div><label>特攻</label><input  type="text" id="dmf-spatk" value="${v('spatk')}"></div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px">

    const v = k => (d[k] ?? '').replace(/"/g,'&quot;');

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px">

function dmAutoDisplay() {
  const name = document.getElementById('dmf-name')?.value || '';
  const form = document.getElementById('dmf-form')?.value || '通常';
  const disp = document.getElementById('dmf-display');
  if (disp) disp.value = form === '通常' ? name : `${name}(${form})`;
}

async function dmSaveEntry() {
  let entry;
  if (dmType === 'pokemon') {
    const name = document.getElementById('dmf-name').value.trim();
    if (!name) { alert('名前を入力してください'); return; }
    const form = document.getElementById('dmf-form').value.trim() || '通常';
    entry = {
      no:             document.getElementById('dmf-no').value.trim(),
      name, form,
      display:        form === '通常' ? name : `${name}(${form})`,
      type1:          document.getElementById('dmf-type1').value.trim(),
      type2:          document.getElementById('dmf-type2').value.trim(),
      hp:             document.getElementById('dmf-hp').value.trim(),
      atk:            document.getElementById('dmf-atk').value.trim(),
      def:            document.getElementById('dmf-def').value.trim(),
      spatk:          document.getElementById('dmf-spatk').value.trim(),
      spdef:          document.getElementById('dmf-spdef').value.trim(),
      spd:            document.getElementById('dmf-spd').value.trim(),
      ability1:       document.getElementById('dmf-ability1').value.trim(),
      ability2:       document.getElementById('dmf-ability2').value.trim(),
      ability_hidden: document.getElementById('dmf-ability-hidden').value.trim(),
      confirmed: document.getElementById('dmf-confirmed')?.checked || false,
    };
    if (dmEditIndex !== null) localPokemon[dmEditIndex] = entry;
    else localPokemon.push(entry);
  } else {
    const name = document.getElementById('dmf-move-name').value.trim();
    if (!name) { alert('技名を入力してください'); return; }
    entry = {
      name,
      type:     document.getElementById('dmf-move-type').value.trim(),
      category: document.getElementById('dmf-move-category').value.trim(),
      power:    document.getElementById('dmf-move-power').value.trim(),
      pp:       document.getElementById('dmf-move-pp').value.trim(),
      desc:     document.getElementById('dmf-move-desc').value.trim(),
      effect:   document.getElementById('dmf-move-effect').value.trim(),
    };
    if (dmEditIndex !== null) localMoves[dmEditIndex] = entry;
    else localMoves.push(entry);
  }
  await dmSaveMasterData();
  alert('登録しました！');
  document.getElementById('dm-form-card').style.display = 'none';
  document.getElementById('dm-search-input').value = '';
}

async function dmDeleteEntry() {
  if (dmEditIndex === null) return;
  const label = dmType==='pokemon' ? localPokemon[dmEditIndex].display : localMoves[dmEditIndex].name;
  if (!confirm(`「${label}」を削除しますか？`)) return;
  if (dmType === 'pokemon') localPokemon.splice(dmEditIndex, 1);
  else localMoves.splice(dmEditIndex, 1);
  await dmSaveMasterData();
  alert('削除しました');
  document.getElementById('dm-form-card').style.display = 'none';
  document.getElementById('dm-search-input').value = '';
}

function dmCancelEdit() {
  document.getElementById('dm-form-card').style.display = 'none';
  document.getElementById('dm-search-input').value = '';
}

async function dmSaveMasterData() {
  // POKEMON_LISTのデフォルトと異なるconfirmedのみを差分として保存
  const defaultConfirmed = {};
  POKEMON_LIST.forEach(p => { defaultConfirmed[p.display] = p.confirmed; });
  const overrides = {};
  localPokemon.forEach(p => {
    if (p.confirmed !== defaultConfirmed[p.display]) {
      overrides[p.display] = p.confirmed;
    }
  });
  localStorage.setItem('pkm_confirmed_overrides', JSON.stringify(overrides));
  localStorage.setItem('pkm_master_moves', JSON.stringify(localMoves));

  if (!currentUser || !_fbReady) return;
  try {
    await window._firestoreOps.setDoc(
      window._firestoreOps.doc(window._db, 'users', currentUser.uid, 'master', 'data'),
      { overrides, moves: localMoves, updatedAt: window._firestoreOps.serverTimestamp() }
    );
  } catch(e) { console.error('Master save error:', e); }
}

async function dmLoadMasterData() {
  // pkm_confirmed_overrides: ユーザーが変更した差分のみを保存・適用
  // POKEMON_LISTのデフォルト値を基準に、差分だけを上書きする
  function applyOverrides() {
    try {
      const overrides = JSON.parse(localStorage.getItem('pkm_confirmed_overrides') || '{}');
      localPokemon.forEach(p => {
        if (p.display in overrides) p.confirmed = overrides[p.display];
      });
    } catch(e) {}
  }
  applyOverrides();

  if (!currentUser || !_fbReady) return;
  try {
    const snap = await window._firestoreOps.getDoc(
      window._firestoreOps.doc(window._db, 'users', currentUser.uid, 'master', 'data')
    );
    if (snap.exists()) {
      const d = snap.data();
      if (d.overrides) {
        localStorage.setItem('pkm_confirmed_overrides', JSON.stringify(d.overrides));
        applyOverrides();
      }
      if (d.moves) {
        localMoves = d.moves;
        localStorage.setItem('pkm_master_moves', JSON.stringify(localMoves));
      }
    }
  } catch(e) { console.error('Master load error:', e); }
}
